<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>

  <defs>
    <marker id="a-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
  </defs>

  <text x="800" y="60" font-size="38" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, system-ui, sans-serif">CIログshippingはwebhook pushでなくpost-hoc pullで組む</text>
  <text x="800" y="100" font-size="22" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, system-ui, sans-serif">CI実行とobservabilityをdecouple、retry/replay可能、API key漏洩リスクを下げる</text>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="40" y="150" width="740" height="700" rx="14" fill="#1a0f0f" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="410" y="200" font-size="28" fill="#ef4444" text-anchor="middle" font-weight="bold">よくあるパターン: webhook push</text>
    <text x="410" y="230" font-size="17" fill="#94a3b8" text-anchor="middle">CI実行中にログを直接Grafanaにpushする</text>

    <rect x="100" y="270" width="580" height="120" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="390" y="312" font-size="21" fill="#e2e8f0" text-anchor="middle" font-weight="bold">CI run (GitHub Actions)</text>
    <rect x="140" y="334" width="500" height="48" rx="6" fill="#1a0f0f" stroke="#475569"/>
    <text x="390" y="365" font-size="16" fill="#cbd5e1" text-anchor="middle">build → test → 同じrun内でlogger.push()で送信</text>

    <line x1="390" y1="400" x2="390" y2="450" stroke="#ef4444" stroke-width="2.5" marker-end="url(#a-red)"/>
    <text x="410" y="432" font-size="16" fill="#ef4444" text-anchor="start">同じrun内で実行</text>

    <rect x="100" y="460" width="580" height="90" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="390" y="498" font-size="21" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Grafana Loki</text>
    <text x="390" y="525" font-size="16" fill="#94a3b8" text-anchor="middle">受信 (OTLP /v1/logs)</text>

    <text x="410" y="600" font-size="19" fill="#ef4444" text-anchor="middle" font-weight="bold">弱み</text>

    <rect x="80" y="620" width="660" height="40" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="646" font-size="15" fill="#fca5a5" text-anchor="middle">✗ shipping失敗がテスト本体を引きずる（タイムアウト等）</text>

    <rect x="80" y="668" width="660" height="40" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="694" font-size="15" fill="#fca5a5" text-anchor="middle">✗ Grafana API keyをCI runtime内に持つ必要あり（leakリスク）</text>

    <rect x="80" y="716" width="660" height="40" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="742" font-size="15" fill="#fca5a5" text-anchor="middle">✗ shippingだけ壊れても、観測側が沈黙して気付けない</text>

    <rect x="80" y="764" width="660" height="40" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="790" font-size="15" fill="#fca5a5" text-anchor="middle">✗ retry/replay不可（テスト本体を再実行しないと再投入できない）</text>
  </g>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="820" y="150" width="740" height="700" rx="14" fill="#0a1f0a" stroke="#4ade80" stroke-width="3"/>
    <text x="1190" y="200" font-size="28" fill="#4ade80" text-anchor="middle" font-weight="bold">cortex: post-hoc pull</text>
    <text x="1190" y="230" font-size="17" fill="#94a3b8" text-anchor="middle">CI完了後に別workflowがGitHub APIからpullしてshipping</text>

    <rect x="880" y="270" width="580" height="72" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="302" font-size="19" fill="#e2e8f0" text-anchor="middle" font-weight="bold">1. CI run (build / test)</text>
    <text x="1170" y="326" font-size="15" fill="#94a3b8" text-anchor="middle">テスト本体のみ ── shippingは一切やらない</text>

    <line x1="1170" y1="342" x2="1170" y2="372" stroke="#4ade80" stroke-width="2.5" marker-end="url(#a-green)"/>
    <text x="1190" y="362" font-size="14" fill="#94a3b8" text-anchor="start">workflow_run発火</text>

    <rect x="880" y="382" width="580" height="72" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="414" font-size="19" fill="#e2e8f0" text-anchor="middle" font-weight="bold">2. 別workflow（ci-log.yml）がトリガー</text>
    <text x="1170" y="438" font-size="15" fill="#94a3b8" text-anchor="middle">CI runの外側、完全に別レイヤー</text>

    <line x1="1170" y1="454" x2="1170" y2="484" stroke="#4ade80" stroke-width="2.5" marker-end="url(#a-green)"/>

    <rect x="880" y="494" width="580" height="72" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="526" font-size="19" fill="#e2e8f0" text-anchor="middle" font-weight="bold">3. GitHub APIからログ取得</text>
    <text x="1170" y="550" font-size="15" fill="#94a3b8" text-anchor="middle">/repos/.../actions/jobs/&#123;id&#125;/logs をpull</text>

    <line x1="1170" y1="566" x2="1170" y2="596" stroke="#4ade80" stroke-width="2.5" marker-end="url(#a-green)"/>

    <rect x="880" y="606" width="580" height="72" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="638" font-size="19" fill="#e2e8f0" text-anchor="middle" font-weight="bold">4. OTLP /v1/logs でGrafana Lokiへ送信</text>
    <text x="1170" y="662" font-size="15" fill="#94a3b8" text-anchor="middle">{service_name="ci", ref, status, job, output, ...}</text>

    <text x="1190" y="722" font-size="19" fill="#4ade80" text-anchor="middle" font-weight="bold">強み</text>

    <rect x="860" y="740" width="660" height="40" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="1190" y="766" font-size="15" fill="#86efac" text-anchor="middle">✓ CI実行とobservabilityをdecouple（shipping失敗はテストに影響なし）</text>

    <rect x="860" y="788" width="660" height="40" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="1190" y="814" font-size="15" fill="#86efac" text-anchor="middle">✓ API keyは別workflowのみ、PR由来コードへのleak経路を遮断</text>
  </g>
</svg>
