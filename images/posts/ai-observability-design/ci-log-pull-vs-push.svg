<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>

  <defs>
    <marker id="a-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/></marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
    <marker id="a-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
  </defs>

  <text x="800" y="58" font-size="30" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, system-ui, sans-serif">CIログ shipping は webhook push ではなく post-hoc pull で組む</text>
  <text x="800" y="94" font-size="17" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, system-ui, sans-serif">CI実行と observability を decouple、 retry/replay 可能、 API key 漏洩リスクを下げる</text>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="40" y="140" width="740" height="700" rx="14" fill="#1a0f0f" stroke="#ef4444" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="410" y="184" font-size="22" fill="#ef4444" text-anchor="middle" font-weight="bold">よくあるパターン: webhook push</text>
    <text x="410" y="210" font-size="14" fill="#94a3b8" text-anchor="middle">CI実行中にログを直接Grafanaに push する</text>

    <rect x="100" y="250" width="580" height="110" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="390" y="288" font-size="17" fill="#e2e8f0" text-anchor="middle" font-weight="bold">CI run (GitHub Actions)</text>
    <rect x="140" y="304" width="500" height="44" rx="6" fill="#1a0f0f" stroke="#475569"/>
    <text x="390" y="332" font-size="14" fill="#cbd5e1" text-anchor="middle">build → test → 同じ run 内で logger.push() でGrafanaに送信</text>

    <line x1="390" y1="370" x2="390" y2="420" stroke="#ef4444" stroke-width="2" marker-end="url(#a-red)"/>
    <text x="410" y="400" font-size="13" fill="#ef4444" text-anchor="start">同じ run 内で実行</text>

    <rect x="100" y="430" width="580" height="80" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
    <text x="390" y="465" font-size="17" fill="#e2e8f0" text-anchor="middle" font-weight="bold">Grafana Loki</text>
    <text x="390" y="488" font-size="13" fill="#94a3b8" text-anchor="middle">受信 (OTLP /v1/logs)</text>

    <text x="410" y="558" font-size="15" fill="#ef4444" text-anchor="middle" font-weight="bold">弱み</text>

    <rect x="80" y="578" width="660" height="36" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="602" font-size="13" fill="#fca5a5" text-anchor="middle">✗ shipping失敗がテスト本体を引きずる (タイムアウト等)</text>

    <rect x="80" y="624" width="660" height="36" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="648" font-size="13" fill="#fca5a5" text-anchor="middle">✗ Grafana API key を CI runtime 内に持たないといけない (= leak リスク)</text>

    <rect x="80" y="670" width="660" height="36" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="694" font-size="13" fill="#fca5a5" text-anchor="middle">✗ shipping だけが壊れた時、 観測側が沈黙して気付けない</text>

    <rect x="80" y="716" width="660" height="36" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="410" y="740" font-size="13" fill="#fca5a5" text-anchor="middle">✗ retry/replay 不可 (テスト本体を再実行しないと再投入できない)</text>

    <text x="410" y="800" font-size="13" fill="#94a3b8" text-anchor="middle" font-style="italic">CI と observability が同じレイヤーに同居 → 全部巻き込まれる</text>
  </g>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="820" y="140" width="740" height="700" rx="14" fill="#0a1f0a" stroke="#4ade80" stroke-width="3"/>
    <text x="1190" y="184" font-size="22" fill="#4ade80" text-anchor="middle" font-weight="bold">cortex: post-hoc pull</text>
    <text x="1190" y="210" font-size="14" fill="#94a3b8" text-anchor="middle">CI完了後に別workflowが GitHub API から pull してshipping</text>

    <rect x="880" y="250" width="580" height="60" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="278" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">1. CI run (build / test)</text>
    <text x="1170" y="298" font-size="12" fill="#94a3b8" text-anchor="middle">テスト本体のみ — shippingは一切やらない</text>

    <line x1="1170" y1="310" x2="1170" y2="340" stroke="#4ade80" stroke-width="2" marker-end="url(#a-green)"/>
    <text x="1188" y="332" font-size="11" fill="#94a3b8" text-anchor="start">workflow_run発火</text>

    <rect x="880" y="350" width="580" height="60" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="378" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">2. 別workflow (ci-log.yml) がトリガーされる</text>
    <text x="1170" y="398" font-size="12" fill="#94a3b8" text-anchor="middle">CI run の外側、 完全に別レイヤー</text>

    <line x1="1170" y1="410" x2="1170" y2="440" stroke="#4ade80" stroke-width="2" marker-end="url(#a-green)"/>

    <rect x="880" y="450" width="580" height="60" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="478" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">3. GitHub API からログ取得</text>
    <text x="1170" y="498" font-size="12" fill="#94a3b8" text-anchor="middle">/repos/.../actions/jobs/{id}/logs を pull</text>

    <line x1="1170" y1="510" x2="1170" y2="540" stroke="#4ade80" stroke-width="2" marker-end="url(#a-green)"/>

    <rect x="880" y="550" width="580" height="60" rx="8" fill="#0f172a" stroke="#475569"/>
    <text x="1170" y="578" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">4. OTLP /v1/logs で Grafana Loki に送信</text>
    <text x="1170" y="598" font-size="12" fill="#94a3b8" text-anchor="middle">{service_name="ci", ref, status, job, output, ...}</text>

    <text x="1190" y="660" font-size="15" fill="#4ade80" text-anchor="middle" font-weight="bold">強み</text>

    <rect x="860" y="678" width="660" height="36" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="1190" y="702" font-size="13" fill="#86efac" text-anchor="middle">✓ CI実行と observability を decouple (shipping失敗はテストに影響なし)</text>

    <rect x="860" y="722" width="660" height="36" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="1190" y="746" font-size="13" fill="#86efac" text-anchor="middle">✓ API key は別 workflow にのみ。 PR由来コードへのleak経路を遮断</text>

    <rect x="860" y="766" width="660" height="36" rx="6" fill="#0f172a" stroke="#374151"/>
    <text x="1190" y="790" font-size="13" fill="#86efac" text-anchor="middle">✓ shippingが壊れたらそれ自体にアラート貼れる + retry/replay可能</text>
  </g>
</svg>
