<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>

  <defs>
    <marker id="a-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/></marker>
    <marker id="a-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/></marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
  </defs>

  <text x="800" y="60" font-size="32" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="system-ui, sans-serif">From CI failure / production alert to an automatically filed PR</text>
  <text x="800" y="100" font-size="19" fill="#94a3b8" text-anchor="middle" font-family="system-ui, sans-serif">Because the observability stack hands AI "what broke" in the right shape, the chain runs autonomously</text>

  <g font-family="system-ui, sans-serif">
    <rect x="40" y="150" width="340" height="220" rx="12" fill="#1a0f0f" stroke="#ef4444" stroke-width="2"/>
    <text x="210" y="190" font-size="20" fill="#ef4444" text-anchor="middle" font-weight="bold">① Detect</text>
    <text x="210" y="220" font-size="15" fill="#cbd5e1" text-anchor="middle">CI failure / production alert</text>
    <line x1="80" y1="238" x2="340" y2="238" stroke="#1e293b"/>
    <text x="210" y="274" font-size="14" fill="#94a3b8" text-anchor="middle">Loki LogQL alert fires</text>
    <text x="210" y="302" font-size="12" fill="#94a3b8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">{service_name="ci",</text>
    <text x="210" y="322" font-size="12" fill="#94a3b8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ref="main", status="failure"}</text>
    <text x="210" y="354" font-size="13" fill="#fb923c" text-anchor="middle" font-style="italic">Observability is the entry point</text>
  </g>

  <line x1="380" y1="260" x2="430" y2="260" stroke="#fb923c" stroke-width="3" marker-end="url(#a-orange)"/>

  <g font-family="system-ui, sans-serif">
    <rect x="440" y="150" width="340" height="220" rx="12" fill="#1a1408" stroke="#fb923c" stroke-width="2"/>
    <text x="610" y="190" font-size="20" fill="#fb923c" text-anchor="middle" font-weight="bold">② Deliver</text>
    <text x="610" y="220" font-size="15" fill="#cbd5e1" text-anchor="middle">event-relay (webhook hub)</text>
    <line x1="480" y1="238" x2="740" y2="238" stroke="#1e293b"/>
    <text x="610" y="278" font-size="14" fill="#94a3b8" text-anchor="middle">Alert → webhook POST</text>
    <text x="610" y="306" font-size="13" fill="#94a3b8" text-anchor="middle">Routing centralized at one point</text>
    <text x="610" y="346" font-size="13" fill="#fb923c" text-anchor="middle" font-style="italic">Delivery routing hub</text>
  </g>

  <line x1="780" y1="260" x2="830" y2="260" stroke="#fb923c" stroke-width="3" marker-end="url(#a-orange)"/>

  <g font-family="system-ui, sans-serif">
    <rect x="840" y="150" width="340" height="220" rx="12" fill="#1a0f1a" stroke="#a78bfa" stroke-width="2"/>
    <text x="1010" y="190" font-size="20" fill="#a78bfa" text-anchor="middle" font-weight="bold">③ Launch</text>
    <text x="1010" y="220" font-size="15" fill="#cbd5e1" text-anchor="middle">auto-review bot</text>
    <line x1="880" y1="238" x2="1140" y2="238" stroke="#1e293b"/>
    <text x="1010" y="278" font-size="14" fill="#94a3b8" text-anchor="middle">Agent backed by</text>
    <text x="1010" y="302" font-size="14" fill="#94a3b8" text-anchor="middle">Claude Code</text>
    <text x="1010" y="346" font-size="13" fill="#a78bfa" text-anchor="middle" font-style="italic">Into the action layer</text>
  </g>

  <line x1="1180" y1="260" x2="1230" y2="260" stroke="#a78bfa" stroke-width="3" marker-end="url(#a-violet)"/>

  <g font-family="system-ui, sans-serif">
    <rect x="1240" y="150" width="320" height="220" rx="12" fill="#1a0f1a" stroke="#a78bfa" stroke-width="2"/>
    <text x="1400" y="190" font-size="20" fill="#a78bfa" text-anchor="middle" font-weight="bold">④ Gather context</text>
    <line x1="1280" y1="208" x2="1520" y2="208" stroke="#1e293b"/>
    <text x="1400" y="236" font-size="14" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Grafana MCP</text>
    <text x="1400" y="258" font-size="13" fill="#94a3b8" text-anchor="middle">→ Pulls full logs</text>
    <text x="1400" y="290" font-size="14" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Product Graph MCP</text>
    <text x="1400" y="312" font-size="13" fill="#94a3b8" text-anchor="middle">→ Related PR / commit / code</text>
    <text x="1400" y="346" font-size="13" fill="#a78bfa" text-anchor="middle" font-style="italic">Observability + structure combined</text>
  </g>

  <line x1="1400" y1="380" x2="1400" y2="480" stroke="#a78bfa" stroke-width="3" marker-end="url(#a-violet)"/>
  <text x="1420" y="434" font-size="15" fill="#a78bfa" text-anchor="start">Analyze, generate fix</text>

  <g font-family="system-ui, sans-serif">
    <rect x="1080" y="490" width="480" height="200" rx="12" fill="#0a1f0a" stroke="#4ade80" stroke-width="3"/>
    <text x="1320" y="534" font-size="20" fill="#4ade80" text-anchor="middle" font-weight="bold">⑤ Propose</text>
    <text x="1320" y="562" font-size="16" fill="#cbd5e1" text-anchor="middle">File a fix PR</text>
    <line x1="1120" y1="580" x2="1520" y2="580" stroke="#1e293b"/>
    <text x="1320" y="612" font-size="14" fill="#94a3b8" text-anchor="middle">Includes commit message / diff /</text>
    <text x="1320" y="634" font-size="14" fill="#94a3b8" text-anchor="middle">link to the root-cause code</text>
    <text x="1320" y="668" font-size="13" fill="#4ade80" text-anchor="middle" font-weight="bold">No human reviewer required</text>
  </g>

  <line x1="1080" y1="590" x2="900" y2="590" stroke="#4ade80" stroke-width="3" marker-end="url(#a-green)"/>

  <g font-family="system-ui, sans-serif">
    <rect x="540" y="490" width="340" height="200" rx="12" fill="#0a1f0a" stroke="#4ade80" stroke-width="2"/>
    <text x="710" y="534" font-size="20" fill="#4ade80" text-anchor="middle" font-weight="bold">⑥ Verify</text>
    <text x="710" y="562" font-size="16" fill="#cbd5e1" text-anchor="middle">CI re-runs</text>
    <line x1="580" y1="580" x2="840" y2="580" stroke="#1e293b"/>
    <text x="710" y="612" font-size="14" fill="#94a3b8" text-anchor="middle">If CI passes, bot</text>
    <text x="710" y="634" font-size="14" fill="#94a3b8" text-anchor="middle">auto-merges</text>
    <text x="710" y="668" font-size="13" fill="#94a3b8" text-anchor="middle">If not, another bot reviews</text>
  </g>

  <g font-family="system-ui, sans-serif">
    <rect x="80" y="730" width="1440" height="160" rx="14" fill="#0f172a" stroke="#fb923c" stroke-width="1"/>
    <text x="800" y="766" font-size="20" fill="#fb923c" text-anchor="middle" font-weight="bold">The quality of observability is the ceiling for AI autonomous operation</text>
    <text x="800" y="794" font-size="14" fill="#cbd5e1" text-anchor="middle">For this chain to hold, the observability side of steps ①–④ must satisfy the following:</text>

    <text x="200" y="828" font-size="14" fill="#fca5a5" text-anchor="start">✗ Failure modes not recognized as "error" → AI never notices</text>
    <text x="200" y="852" font-size="14" fill="#fca5a5" text-anchor="start">✗ Logs exist but stacktrace is dropped → AI can't trace back to the cause</text>
    <text x="200" y="876" font-size="14" fill="#fca5a5" text-anchor="start">✗ Related PR / commit / code isn't on the graph → AI has no context</text>
  </g>
</svg>
