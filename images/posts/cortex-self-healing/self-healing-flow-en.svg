<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>

  <defs>
    <marker id="a-94a3b8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="a-4ade80" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
    <marker id="a-38bdf8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/></marker>
    <marker id="a-fb923c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/></marker>
    <marker id="a-f87171" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/></marker>
  </defs>

  <!-- Title -->
  <text x="800" y="56" font-size="36" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Inter, Noto Sans, system-ui, sans-serif">Self-Healing Full Flow — Median 30 min – 1 hr from firing alert to production recovery</text>
  <text x="800" y="92" font-size="24" fill="#94a3b8" text-anchor="middle" font-family="Inter, Noto Sans, system-ui, sans-serif">115 Self-Healing PRs merged + auto-redeployed in the past 30 days. Humans only step in when the AI judges the case unfixable.</text>

  <!-- Phase labels -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif" font-size="21">
    <text x="140" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">1. Trigger</text>
    <text x="400" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">2. Relay</text>
    <text x="660" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">3. self-healing mode</text>
    <text x="960" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">4. Review (Part 3)</text>
    <text x="1320" y="150" fill="#cbd5e1" text-anchor="middle" font-weight="bold">5. Merge &amp; Deploy</text>
  </g>

  <!-- ============= 1. Trigger ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="30" y="180" width="240" height="280" rx="14" fill="#251a0d" stroke="#f87171" stroke-width="2.5"/>
    <text x="150" y="218" font-size="24" fill="#f87171" text-anchor="middle" font-weight="bold">Grafana Alert</text>
    <text x="150" y="240" font-size="17" fill="#cbd5e1" text-anchor="middle">firing</text>

    <line x1="50" y1="258" x2="230" y2="258" stroke="#334155" stroke-width="1"/>

    <text x="150" y="282" font-size="16" fill="#94a3b8" text-anchor="middle">Pulumi-managed Alert Rule</text>
    <text x="150" y="312" font-size="16" fill="#94a3b8" text-anchor="middle">error threshold trip /</text>
    <text x="150" y="330" font-size="16" fill="#94a3b8" text-anchor="middle">deploy failed /</text>
    <text x="150" y="348" font-size="16" fill="#94a3b8" text-anchor="middle">pipeline failure</text>

    <line x1="50" y1="384" x2="230" y2="384" stroke="#334155" stroke-width="1"/>

    <text x="150" y="408" font-size="16" fill="#cbd5e1" text-anchor="middle" font-weight="bold">POST /webhook/grafana</text>
    <text x="150" y="430" font-size="15" fill="#94a3b8" text-anchor="middle">Payload → relay</text>
  </g>
  <line x1="272" y1="320" x2="288" y2="320" stroke="#f87171" stroke-width="2" marker-end="url(#a-fb923c)"/>

  <!-- ============= 2. Event Relay ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="290" y="180" width="240" height="280" rx="14" fill="#1a0d0a" stroke="#fb923c" stroke-width="2.5"/>
    <text x="410" y="218" font-size="22" fill="#fb923c" text-anchor="middle" font-weight="bold">Event Relay (in-house)</text>
    <text x="410" y="240" font-size="16" fill="#94a3b8" text-anchor="middle">Cloud Run + Firestore</text>

    <line x1="310" y1="258" x2="510" y2="258" stroke="#334155" stroke-width="1"/>

    <text x="410" y="284" font-size="17" fill="#cbd5e1" text-anchor="middle">Receive webhook</text>
    <text x="410" y="302" font-size="17" fill="#cbd5e1" text-anchor="middle">→ Persist in Firestore</text>

    <text x="410" y="332" font-size="17" fill="#cbd5e1" text-anchor="middle">SSE push to each PC</text>
    <text x="410" y="350" font-size="15" fill="#94a3b8" text-anchor="middle">event: grafana-alert</text>

    <line x1="310" y1="370" x2="510" y2="370" stroke="#334155" stroke-width="1"/>

    <text x="410" y="394" font-size="14" fill="#94a3b8" text-anchor="middle">Last-Event-ID re-sends unsent events</text>
    <text x="410" y="412" font-size="14" fill="#94a3b8" text-anchor="middle">Zero drops</text>
    <text x="410" y="436" font-size="14" fill="#94a3b8" text-anchor="middle">Shared with GitHub webhook</text>
  </g>
  <line x1="532" y1="320" x2="568" y2="320" stroke="#fb923c" stroke-width="2" marker-end="url(#a-fb923c)"/>

  <!-- ============= 3. self-healing mode ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="570" y="180" width="280" height="460" rx="14" fill="#1a0d0a" stroke="#fb923c" stroke-width="2.5"/>
    <text x="710" y="218" font-size="21" fill="#fb923c" text-anchor="middle" font-weight="bold">webhook-server.mjs</text>
    <text x="710" y="238" font-size="19" fill="#fb923c" text-anchor="middle" font-weight="bold">MODE=self-healing</text>
    <text x="710" y="258" font-size="15" fill="#94a3b8" text-anchor="middle">Runs on the assignee's machine</text>

    <!-- Throttle -->
    <rect x="590" y="276" width="240" height="44" rx="6" fill="#0a1820" stroke="#fb923c" stroke-width="1.3"/>
    <text x="710" y="297" font-size="16" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Throttle check</text>
    <text x="710" y="313" font-size="14" fill="#94a3b8" text-anchor="middle">Same fingerprint skipped for 4h</text>

    <!-- Worktree spawn -->
    <rect x="590" y="328" width="240" height="44" rx="6" fill="#0a1820" stroke="#fb923c" stroke-width="1.3"/>
    <text x="710" y="349" font-size="16" fill="#cbd5e1" text-anchor="middle" font-weight="bold">git worktree add</text>
    <text x="710" y="365" font-size="14" fill="#94a3b8" text-anchor="middle">hotfix/auto-alert-{service}-{ts}</text>

    <!-- claude -p investigation -->
    <rect x="590" y="380" width="240" height="240" rx="8" fill="#251a0d" stroke="#fb923c" stroke-width="1.8"/>
    <text x="710" y="404" font-size="17" fill="#fb923c" text-anchor="middle" font-weight="bold">claude -p in worktree</text>

    <line x1="596" y1="416" x2="824" y2="416" stroke="#334155" stroke-width="1"/>

    <rect x="596" y="424" width="228" height="22" rx="4" fill="#1a1525" stroke="#a78bfa" stroke-width="1"/>
    <text x="710" y="439" font-size="12" fill="#cbd5e1" text-anchor="middle">① Search related code via cpg</text>

    <rect x="596" y="450" width="228" height="22" rx="4" fill="#0d1f2d" stroke="#38bdf8" stroke-width="1"/>
    <text x="710" y="465" font-size="12" fill="#cbd5e1" text-anchor="middle">② Loki query via Grafana MCP</text>

    <rect x="596" y="476" width="228" height="22" rx="4" fill="#0a1820" stroke="#94a3b8" stroke-width="1"/>
    <text x="710" y="491" font-size="12" fill="#cbd5e1" text-anchor="middle">③ git blame the offending commit</text>

    <rect x="596" y="502" width="228" height="22" rx="4" fill="#251a0d" stroke="#fb923c" stroke-width="1"/>
    <text x="710" y="517" font-size="12" fill="#cbd5e1" text-anchor="middle">④ Implement fix + update tests</text>

    <rect x="596" y="528" width="228" height="22" rx="4" fill="#251a0d" stroke="#fb923c" stroke-width="1"/>
    <text x="710" y="543" font-size="12" fill="#cbd5e1" text-anchor="middle">⑤ [Recurrence]: expansion + Guide</text>

    <rect x="596" y="554" width="228" height="22" rx="4" fill="#1a0d0a" stroke="#fb923c" stroke-width="1"/>
    <text x="710" y="569" font-size="12" fill="#cbd5e1" text-anchor="middle">⑥ conventional commit</text>

    <text x="710" y="592" font-size="13" fill="#94a3b8" text-anchor="middle">If unfixable → Slack notification</text>
  </g>
  <line x1="852" y1="410" x2="888" y2="410" stroke="#fb923c" stroke-width="2" marker-end="url(#a-38bdf8)"/>

  <!-- ============= 4. Auto-review (Part 3) ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="890" y="180" width="340" height="460" rx="14" fill="#0d1f2d" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="1060" y="218" font-size="21" fill="#38bdf8" text-anchor="middle" font-weight="bold">Part 3 auto-review pipeline</text>
    <text x="1060" y="240" font-size="15" fill="#94a3b8" text-anchor="middle">Self-Healing-opened PRs go through</text>
    <text x="1060" y="258" font-size="15" fill="#94a3b8" text-anchor="middle">the same pipeline (independent AI)</text>

    <line x1="900" y1="276" x2="1220" y2="276" stroke="#334155" stroke-width="1"/>

    <text x="1060" y="300" font-size="17" fill="#38bdf8" text-anchor="middle" font-weight="bold">9 lenses checked in order</text>

    <g font-size="13" fill="#cbd5e1" text-anchor="middle">
      <rect x="900" y="312" width="320" height="22" rx="4" fill="#0a1820" stroke="#38bdf8" stroke-width="1"/>
      <text x="1060" y="327">① [Graph]  ② [Architecture]  ③ [Security]</text>

      <rect x="900" y="338" width="320" height="22" rx="4" fill="#0a1820" stroke="#38bdf8" stroke-width="1"/>
      <text x="1060" y="353">④ [Test]  ⑤ [Doc]  ⑥ [Impact]</text>

      <rect x="900" y="364" width="320" height="22" rx="4" fill="#0a1820" stroke="#38bdf8" stroke-width="1"/>
      <text x="1060" y="379">⑦ [Observability]  ⑧ [AI-Antipattern]</text>

      <rect x="900" y="390" width="320" height="22" rx="4" fill="#1a1525" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="1060" y="405" font-size="12" fill="#a78bfa">⑨ [Recurrence] ← requires a new Guide</text>
    </g>

    <line x1="900" y1="424" x2="1220" y2="424" stroke="#334155" stroke-width="1"/>

    <text x="1060" y="448" font-size="16" fill="#cbd5e1" text-anchor="middle">Critical / Major present</text>
    <text x="1060" y="468" font-size="15" fill="#f87171" text-anchor="middle">→ REQUEST_CHANGES (back to Self-Healing)</text>

    <text x="1060" y="492" font-size="16" fill="#cbd5e1" text-anchor="middle">Nit only / no findings</text>
    <text x="1060" y="512" font-size="15" fill="#4ade80" text-anchor="middle">→ APPROVE</text>

    <line x1="900" y1="530" x2="1220" y2="530" stroke="#334155" stroke-width="1"/>

    <text x="1060" y="554" font-size="14" fill="#94a3b8" text-anchor="middle">Avg. 10.8 review-fix iterations</text>
    <text x="1060" y="572" font-size="14" fill="#94a3b8" text-anchor="middle">(fix + review run as separate AI sessions)</text>

    <text x="1060" y="598" font-size="14" fill="#94a3b8" text-anchor="middle">'No fix without a lint'</text>
    <text x="1060" y="616" font-size="14" fill="#94a3b8" text-anchor="middle">connects to the Strengthening layer</text>
  </g>
  <line x1="1232" y1="410" x2="1268" y2="410" stroke="#38bdf8" stroke-width="2" marker-end="url(#a-4ade80)"/>

  <!-- ============= 5. Merge & Deploy ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="1270" y="180" width="310" height="460" rx="14" fill="#0d251a" stroke="#4ade80" stroke-width="2.5"/>
    <text x="1425" y="218" font-size="22" fill="#4ade80" text-anchor="middle" font-weight="bold">Auto-merge → auto-redeploy</text>
    <text x="1425" y="240" font-size="16" fill="#94a3b8" text-anchor="middle">No human involvement</text>

    <line x1="1280" y1="258" x2="1570" y2="258" stroke="#334155" stroke-width="1"/>

    <rect x="1280" y="276" width="290" height="44" rx="6" fill="#0a1820" stroke="#4ade80" stroke-width="1.3"/>
    <text x="1425" y="297" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">squash merge to main</text>
    <text x="1425" y="313" font-size="13" fill="#94a3b8" text-anchor="middle">Auto-merge when CI green + APPROVE both hold</text>

    <rect x="1280" y="328" width="290" height="44" rx="6" fill="#0a1820" stroke="#4ade80" stroke-width="1.3"/>
    <text x="1425" y="349" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Turborepo build</text>
    <text x="1425" y="365" font-size="14" fill="#94a3b8" text-anchor="middle">Diff-build only affected scope</text>

    <rect x="1280" y="380" width="290" height="44" rx="6" fill="#0a1820" stroke="#4ade80" stroke-width="1.3"/>
    <text x="1425" y="401" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Pulumi parallel deploy</text>
    <text x="1425" y="417" font-size="14" fill="#94a3b8" text-anchor="middle">Parallel up per stack</text>

    <line x1="1280" y1="438" x2="1570" y2="438" stroke="#334155" stroke-width="1"/>

    <text x="1425" y="464" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">Production recovered</text>
    <text x="1425" y="486" font-size="15" fill="#cbd5e1" text-anchor="middle">✓ notification in Slack thread</text>

    <line x1="1280" y1="504" x2="1570" y2="504" stroke="#334155" stroke-width="1"/>

    <text x="1425" y="530" font-size="15" fill="#94a3b8" text-anchor="middle">Median: 30 min – 1 hr</text>
    <text x="1425" y="548" font-size="15" fill="#94a3b8" text-anchor="middle">Fires at 7am → recovered by 7:15 →</text>
    <text x="1425" y="566" font-size="15" fill="#94a3b8" text-anchor="middle">By 9am, just a ✓ in Slack</text>

    <text x="1425" y="598" font-size="15" fill="#94a3b8" text-anchor="middle" font-weight="bold">+ A new Guide ships</text>
    <text x="1425" y="615" font-size="15" fill="#94a3b8" text-anchor="middle" font-weight="bold">to production alongside</text>
  </g>

  <!-- Bottom info -->
  <text x="800" y="720" font-size="19" fill="#94a3b8" text-anchor="middle" font-family="Inter, Noto Sans, system-ui, sans-serif">Deduplication: same fingerprint skipped for 4h / credential-related alerts skipped permanently (human escalation)</text>

  <!-- Timeline at bottom -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <line x1="80" y1="780" x2="1520" y2="780" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="80" y="775" font-size="15" fill="#94a3b8" text-anchor="middle">0min</text>
    <line x1="80" y1="772" x2="80" y2="788" stroke="#94a3b8" stroke-width="1.5"/>

    <text x="290" y="775" font-size="15" fill="#94a3b8" text-anchor="middle">1min</text>
    <line x1="290" y1="772" x2="290" y2="788" stroke="#94a3b8" stroke-width="1.5"/>

    <text x="700" y="775" font-size="15" fill="#94a3b8" text-anchor="middle">3〜8min</text>
    <line x1="700" y1="772" x2="700" y2="788" stroke="#94a3b8" stroke-width="1.5"/>

    <text x="1100" y="775" font-size="15" fill="#94a3b8" text-anchor="middle">25〜50min</text>
    <line x1="1100" y1="772" x2="1100" y2="788" stroke="#94a3b8" stroke-width="1.5"/>

    <text x="1520" y="775" font-size="15" fill="#94a3b8" text-anchor="middle">30min〜1hr</text>
    <line x1="1520" y1="772" x2="1520" y2="788" stroke="#94a3b8" stroke-width="1.5"/>

    <text x="800" y="820" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">Timeline: firing alert → production recovery</text>
    <text x="800" y="842" font-size="15" fill="#94a3b8" text-anchor="middle">Often finishes before anyone wakes up</text>
  </g>
</svg>
