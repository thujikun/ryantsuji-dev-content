<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <rect width="1600" height="960" fill="#0f172a"/>

  <defs>
    <marker id="a-94a3b8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="a-4ade80" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
    <marker id="a-38bdf8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/></marker>
    <marker id="a-a78bfa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/></marker>
  </defs>

  <!-- Title -->
  <text x="800" y="56" font-size="34" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, sans-serif">レールを敷くのはエンジニア / レールの上を走るのは誰でもできる</text>
  <text x="800" y="92" font-size="20" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">非エンジニアが本番にPRを出せる範囲と、エンジニアが残る領域の境界線</text>

  <!-- ============= Panel 1: 非エンジニア領域 (top) ============= -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="60" y="130" width="1480" height="270" rx="14" fill="#0d251a" stroke="#4ade80" stroke-width="2.5"/>
    <text x="100" y="170" font-size="26" fill="#4ade80" font-weight="bold">非エンジニアが書ける範囲</text>
    <text x="100" y="196" font-size="16" fill="#94a3b8">ハーネスが品質を担保するので、業務要件を一番把握している人がそのまま書ける</text>

    <!-- 4 cards at y=220, each 280w x 100h, gap 40 -->
    <g transform="translate(0, 220)">
      <rect x="180" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="320" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">新しいページ追加</text>
      <text x="320" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">既存routingに</text>
      <text x="320" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">新規routeを増やす</text>

      <rect x="500" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="640" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">新規API endpoint</text>
      <text x="640" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">/api/*に</text>
      <text x="640" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">新規endpointを追加</text>

      <rect x="820" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="960" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">新データ取得</text>
      <text x="960" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">BigQuery / Firestoreから</text>
      <text x="960" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">既存pipelineに乗せる</text>

      <rect x="1140" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="1280" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">既存機能の改修</text>
      <text x="1280" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">UI / 集計条件 / KPI指標</text>
      <text x="1280" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">既存ロジックの調整</text>
    </g>

    <text x="800" y="380" font-size="14" fill="#94a3b8" text-anchor="middle">+ 自分が踏んだ罠をdocsに固定 (Part 4のRecurrence Preventionに参加) も同様</text>
  </g>

  <!-- Boundary line + label -->
  <line x1="60" y1="425" x2="1540" y2="425" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="800" y="447" font-size="15" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">↑ ハーネスが「逸脱しないレール」を提供 / ↓ レール (= ハーネス) とその土台 (= stack) はエンジニアが整える</text>

  <!-- ============= Panel 2: ハーネス層 (middle) ============= -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="60" y="470" width="1480" height="200" rx="14" fill="#1a1525" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="100" y="510" font-size="24" fill="#a78bfa" font-weight="bold">エンジニア領域① ハーネス自体の設計・拡張</text>
    <text x="100" y="536" font-size="15" fill="#94a3b8">lens枠組み / Self-Healingフロー / 新規lint rule / ガイドライン構造 — フライホイール全体を見る判断</text>

    <!-- 4 cards at y=560 -->
    <g transform="translate(0, 560)">
      <rect x="180" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="320" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">Auto Review lens設計</text>
      <text x="320" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">9 lensの責務分担 /</text>
      <text x="320" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">判定閾値の決め方</text>

      <rect x="500" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="640" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">Self-Healingフロー</text>
      <text x="640" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">アラート → AI調査 →</text>
      <text x="640" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">修正PR → 再デプロイ</text>

      <rect x="820" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="960" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">新規lint rule</text>
      <text x="960" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">eslint-plugin-graph等で</text>
      <text x="960" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">罠を機械的に弾く</text>

      <rect x="1140" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="1280" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">ガイドライン構造</text>
      <text x="1280" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">docs/gotchas / severity</text>
      <text x="1280" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">の追加・整理</text>
    </g>
  </g>

  <!-- Annotation between Panel 2 and 3 -->
  <text x="800" y="695" font-size="15" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">↓ ハーネスはstackの上に乗っている</text>

  <!-- ============= Panel 3: stack 層 (bottom) ============= -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="60" y="715" width="1480" height="200" rx="14" fill="#0d1f2d" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="100" y="755" font-size="24" fill="#38bdf8" font-weight="bold">エンジニア領域② stackの立ち上げ</text>
    <text x="100" y="781" font-size="15" fill="#94a3b8">アプリやインフラを0から立ち上げる仕事。インフラ知識 / 認証 / セキュリティの常識が要る</text>

    <!-- 4 cards at y=805 -->
    <g transform="translate(0, 805)">
      <rect x="180" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="320" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">インフラ</text>
      <text x="320" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Pulumi / IaC / Cloud Run /</text>
      <text x="320" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">BQ / Pub/Subの構成</text>

      <rect x="500" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="640" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">認証 / Secret管理</text>
      <text x="640" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">OAuth / webhook /</text>
      <text x="640" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">Secret Manager</text>

      <rect x="820" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="960" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">セキュリティ境界</text>
      <text x="960" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">露出 / サニタイズ /</text>
      <text x="960" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">権限の切り方</text>

      <rect x="1140" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="1280" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">コンテナ起動構成</text>
      <text x="1280" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Dockerfile /</text>
      <text x="1280" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">起動commandの設計</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="800" y="945" font-size="14" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">家の中の改装は誰でも可、家自体を建てるのも、家を守るレール (ハーネス) を設計するのもエンジニアの仕事</text>
</svg>
