  <!-- Title -->
  <text x="800" y="56" font-size="34" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, sans-serif">гғ¬гғјгғ«гӮ’ж•·гҒҸгҒ®гҒҜгӮЁгғігӮёгғӢгӮў / гғ¬гғјгғ«гҒ®дёҠгӮ’иө°гӮӢгҒ®гҒҜиӘ°гҒ§гӮӮгҒ§гҒҚгӮӢ</text>
  <text x="800" y="92" font-size="20" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">йқһгӮЁгғігӮёгғӢгӮўгҒҢжң¬з•ӘгҒ«PRгӮ’еҮәгҒӣгӮӢзҜ„еӣІгҒЁгҖҒгӮЁгғігӮёгғӢгӮўгҒҢж®ӢгӮӢй ҳеҹҹгҒ®еўғз•Ңз·ҡ</text>

  <!-- ============= Panel 1: йқһгӮЁгғігӮёгғӢгӮўй ҳеҹҹ (top) ============= -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="60" y="130" width="1480" height="270" rx="14" fill="#0d251a" stroke="#4ade80" stroke-width="2.5"/>
    <text x="100" y="170" font-size="26" fill="#4ade80" font-weight="bold">йқһгӮЁгғігӮёгғӢгӮўгҒҢжӣёгҒ‘гӮӢзҜ„еӣІ</text>
    <text x="100" y="196" font-size="16" fill="#94a3b8">гғҸгғјгғҚгӮ№гҒҢе“ҒиіӘгӮ’жӢ…дҝқгҒҷгӮӢгҒ®гҒ§гҖҒжҘӯеӢҷиҰҒд»¶гӮ’дёҖз•ӘжҠҠжҸЎгҒ—гҒҰгҒ„гӮӢдәәгҒҢгҒқгҒ®гҒҫгҒҫжӣёгҒ‘гӮӢ</text>

    <!-- 4 cards at y=220, each 280w x 100h, gap 40 -->
    <g transform="translate(0, 220)">
      <rect x="180" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="320" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">ж–°гҒ—гҒ„гғҡгғјгӮёиҝҪеҠ </text>
      <text x="320" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">ж—ўеӯҳroutingгҒ«</text>
      <text x="320" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">ж–°иҰҸrouteгӮ’еў—гӮ„гҒҷ</text>

      <rect x="500" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="640" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">ж–°иҰҸAPI endpoint</text>
      <text x="640" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">/api/*гҒ«</text>
      <text x="640" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">ж–°иҰҸendpointгӮ’иҝҪеҠ </text>

      <rect x="820" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="960" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">ж–°гғҮгғјгӮҝеҸ–еҫ—</text>
      <text x="960" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">BigQuery / FirestoreгҒӢгӮү</text>
      <text x="960" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">ж—ўеӯҳpipelineгҒ«д№—гҒӣгӮӢ</text>

      <rect x="1140" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="1280" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">ж—ўеӯҳж©ҹиғҪгҒ®ж”№дҝ®</text>
      <text x="1280" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">UI / йӣҶиЁҲжқЎд»¶ / KPIжҢҮжЁҷ</text>
      <text x="1280" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">ж—ўеӯҳгғӯгӮёгғғгӮҜгҒ®иӘҝж•ҙ</text>
    </g>

    <text x="800" y="380" font-size="14" fill="#94a3b8" text-anchor="middle">+ иҮӘеҲҶгҒҢиёҸгӮ“гҒ зҪ гӮ’docsгҒ«еӣәе®ҡ (Part 4гҒ®Recurrence PreventionгҒ«еҸӮеҠ ) гӮӮеҗҢж§ҳ</text>
  </g>

  <!-- Boundary line + label -->
  <line x1="60" y1="425" x2="1540" y2="425" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
