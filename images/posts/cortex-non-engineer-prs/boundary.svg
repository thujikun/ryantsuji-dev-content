  <!-- Footer -->
  <text x="800" y="945" font-size="14" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">е®¶гҒ®дёӯгҒ®ж”№иЈ…гҒҜиӘ°гҒ§гӮӮеҸҜгҖҒе®¶иҮӘдҪ“гӮ’е»әгҒҰгӮӢгҒ®гӮӮгҖҒе®¶гӮ’е®ҲгӮӢгғ¬гғјгғ« (гғҸгғјгғҚгӮ№) гӮ’иЁӯиЁҲгҒҷгӮӢгҒ®гӮӮгӮЁгғігӮёгғӢгӮўгҒ®д»•дәӢ</text>
