      <text x="320" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">9иҰізӮ№гҒ®иІ¬еӢҷеҲҶжӢ… /</text>
      <text x="320" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">еҲӨе®ҡй–ҫеҖӨгҒ®жұәгӮҒж–№</text>

      <rect x="500" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="640" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">Self-Healingгғ•гғӯгғј</text>
      <text x="640" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">гӮўгғ©гғјгғҲ вҶ’ AIиӘҝжҹ» вҶ’</text>
      <text x="640" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">дҝ®жӯЈPR вҶ’ еҶҚгғҮгғ—гғӯгӮӨ</text>

      <rect x="820" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="960" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">ж–°иҰҸlint rule</text>
      <text x="960" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">eslint-plugin-graphзӯүгҒ§</text>
      <text x="960" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">зҪ гӮ’ж©ҹжў°зҡ„гҒ«ејҫгҒҸ</text>

      <rect x="1140" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="1280" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">гӮ¬гӮӨгғүгғ©гӮӨгғіж§ӢйҖ </text>
      <text x="1280" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">docs/gotchas / severity</text>
      <text x="1280" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">гҒ®иҝҪеҠ гғ»ж•ҙзҗҶ</text>
    </g>
  </g>

  <!-- Annotation between Panel 2 and 3 -->
  <text x="800" y="695" font-size="15" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">вҶ“ гғҸгғјгғҚгӮ№гҒҜstackгҒ®дёҠгҒ«д№—гҒЈгҒҰгҒ„гӮӢ</text>

