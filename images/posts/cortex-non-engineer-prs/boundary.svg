    <text x="100" y="755" font-size="24" fill="#38bdf8" font-weight="bold">гӮЁгғігӮёгғӢгӮўй ҳеҹҹв‘Ў stackгҒ®з«ӢгҒЎдёҠгҒ’</text>
    <text x="100" y="781" font-size="15" fill="#94a3b8">гӮўгғ—гғӘгӮ„гӮӨгғігғ•гғ©гӮ’0гҒӢгӮүз«ӢгҒЎдёҠгҒ’гӮӢд»•дәӢгҖӮгӮӨгғігғ•гғ©зҹҘиӯҳ / иӘҚиЁј / гӮ»гӮӯгғҘгғӘгғҶгӮЈгҒ®еёёиӯҳгҒҢиҰҒгӮӢ</text>

