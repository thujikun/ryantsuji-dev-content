      <text x="320" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Pulumi / IaC / Cloud Run /</text>
      <text x="320" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">BQ / Pub/SubгҒ®ж§ӢжҲҗ</text>

      <rect x="500" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="640" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">иӘҚиЁј / Secretз®ЎзҗҶ</text>
      <text x="640" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">OAuth / webhook /</text>
      <text x="640" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">Secret Manager</text>

      <rect x="820" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="960" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">гӮ»гӮӯгғҘгғӘгғҶгӮЈеўғз•Ң</text>
      <text x="960" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">йңІеҮә / гӮөгғӢгӮҝгӮӨгӮә /</text>
      <text x="960" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">жЁ©йҷҗгҒ®еҲҮгӮҠж–№</text>

      <rect x="1140" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="1280" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">гӮігғігғҶгғҠиө·еӢ•ж§ӢжҲҗ</text>
      <text x="1280" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Dockerfile /</text>
      <text x="1280" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">иө·еӢ•commandгҒ®иЁӯиЁҲ</text>
