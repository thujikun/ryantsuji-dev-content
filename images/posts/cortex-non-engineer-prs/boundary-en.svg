<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960">
  <rect width="1600" height="960" fill="#0f172a"/>

  <defs>
    <marker id="a-94a3b8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="a-4ade80" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
    <marker id="a-38bdf8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/></marker>
    <marker id="a-a78bfa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/></marker>
  </defs>

  <!-- Title -->
  <text x="800" y="56" font-size="34" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Inter, Noto Sans, system-ui, sans-serif">Engineers lay the rails / Anyone can run on them</text>
  <text x="800" y="92" font-size="20" fill="#94a3b8" text-anchor="middle" font-family="Inter, Noto Sans, system-ui, sans-serif">The boundary between what non-engineers can ship to production and what stays with engineering</text>

  <!-- ============= Panel 1: Non-engineer surface (top) ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="60" y="130" width="1480" height="270" rx="14" fill="#0d251a" stroke="#4ade80" stroke-width="2.5"/>
    <text x="100" y="170" font-size="26" fill="#4ade80" font-weight="bold">What non-engineers can write</text>
    <text x="100" y="196" font-size="16" fill="#94a3b8">The harness handles quality, so the person closest to the requirements writes the change directly</text>

    <!-- 4 cards at y=220, each 280w x 110h -->
    <g transform="translate(0, 220)">
      <rect x="180" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="320" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">Add a new page</text>
      <text x="320" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">A new route under</text>
      <text x="320" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">existing routing</text>

      <rect x="500" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="640" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">New API endpoint</text>
      <text x="640" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">A new endpoint</text>
      <text x="640" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">under /api/*</text>

      <rect x="820" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="960" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">New data pull</text>
      <text x="960" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">From BigQuery / Firestore,</text>
      <text x="960" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">into existing pipelines</text>

      <rect x="1140" y="0" width="280" height="110" rx="8" fill="#0a1820" stroke="#4ade80" stroke-width="1.5"/>
      <text x="1280" y="32" font-size="17" fill="#4ade80" text-anchor="middle" font-weight="bold">Modify features</text>
      <text x="1280" y="60" font-size="13" fill="#cbd5e1" text-anchor="middle">UI / filters / KPI metrics,</text>
      <text x="1280" y="80" font-size="13" fill="#cbd5e1" text-anchor="middle">tweaks to existing logic</text>
    </g>

    <text x="800" y="380" font-size="14" fill="#94a3b8" text-anchor="middle">+ Pinning your own traps into docs (joining Part 4's Recurrence Prevention loop) -- same family of contribution</text>
  </g>

  <!-- Boundary line + label -->
  <line x1="60" y1="425" x2="1540" y2="425" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="800" y="447" font-size="15" fill="#94a3b8" text-anchor="middle" font-family="Inter, Noto Sans, system-ui, sans-serif">↑ Harness provides "rails you can't derail from" / ↓ The rails (= harness) and their foundation (= stack) are laid by engineers</text>

  <!-- ============= Panel 2: Harness layer (middle) ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="60" y="470" width="1480" height="200" rx="14" fill="#1a1525" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="100" y="510" font-size="24" fill="#a78bfa" font-weight="bold">Engineering ① -- Harness design &amp; extension</text>
    <text x="100" y="536" font-size="15" fill="#94a3b8">Dimension framework / Self-Healing flow / new lint rules / guideline structure -- judgment that needs the whole flywheel in view</text>

    <!-- 4 cards at y=560 -->
    <g transform="translate(0, 560)">
      <rect x="180" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="320" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">Auto Review dimensions</text>
      <text x="320" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Responsibility splits and</text>
      <text x="320" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">threshold calibration</text>

      <rect x="500" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="640" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">Self-Healing flow</text>
      <text x="640" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Alert → AI investigation →</text>
      <text x="640" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">fix PR → redeploy</text>

      <rect x="820" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="960" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">New lint rules</text>
      <text x="960" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Via eslint-plugin-graph etc.,</text>
      <text x="960" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">rejecting traps mechanically</text>

      <rect x="1140" y="0" width="280" height="90" rx="8" fill="#120a25" stroke="#a78bfa" stroke-width="1.5"/>
      <text x="1280" y="28" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="bold">Guideline structure</text>
      <text x="1280" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Organizing docs/gotchas /</text>
      <text x="1280" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">severity docs</text>
    </g>
  </g>

  <!-- Annotation between Panel 2 and 3 -->
  <text x="800" y="695" font-size="15" fill="#94a3b8" text-anchor="middle" font-family="Inter, Noto Sans, system-ui, sans-serif">↓ The harness sits on top of the stack</text>

  <!-- ============= Panel 3: Stack layer (bottom) ============= -->
  <g font-family="Inter, Noto Sans, system-ui, sans-serif">
    <rect x="60" y="715" width="1480" height="200" rx="14" fill="#0d1f2d" stroke="#38bdf8" stroke-width="2.5"/>
    <text x="100" y="755" font-size="24" fill="#38bdf8" font-weight="bold">Engineering ② -- Standing up the stack</text>
    <text x="100" y="781" font-size="15" fill="#94a3b8">Standing up an app or infrastructure from zero. Requires infrastructure / authentication / security awareness</text>

    <!-- 4 cards at y=805 -->
    <g transform="translate(0, 805)">
      <rect x="180" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="320" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">Infrastructure</text>
      <text x="320" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Pulumi / IaC / Cloud Run /</text>
      <text x="320" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">BigQuery / Pub/Sub setup</text>

      <rect x="500" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="640" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">Auth / Secret mgmt</text>
      <text x="640" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">OAuth / webhooks /</text>
      <text x="640" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">Secret Manager</text>

      <rect x="820" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="960" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">Security boundaries</text>
      <text x="960" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">What to expose / sanitize /</text>
      <text x="960" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">where to cut privileges</text>

      <rect x="1140" y="0" width="280" height="90" rx="8" fill="#0a1820" stroke="#38bdf8" stroke-width="1.5"/>
      <text x="1280" y="28" font-size="16" fill="#38bdf8" text-anchor="middle" font-weight="bold">Container startup</text>
      <text x="1280" y="54" font-size="13" fill="#cbd5e1" text-anchor="middle">Dockerfile and</text>
      <text x="1280" y="72" font-size="13" fill="#cbd5e1" text-anchor="middle">startup command design</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="800" y="945" font-size="14" fill="#94a3b8" text-anchor="middle" font-family="Inter, Noto Sans, system-ui, sans-serif">Renovating inside the house: anyone. Building the house, or designing the rails (= harness) that keep it safe: engineering.</text>
</svg>
