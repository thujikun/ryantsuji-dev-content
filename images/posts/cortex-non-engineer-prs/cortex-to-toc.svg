<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>

  <defs>
    <marker id="a-94a3b8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="a-a78bfa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/></marker>
    <marker id="a-fb923c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/></marker>
  </defs>

  <!-- Title -->
  <text x="800" y="56" font-size="34" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, sans-serif">cortexの型をtoCサービスに変形して持ち込む</text>
  <text x="800" y="92" font-size="20" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">コンテキスト基盤と最終承認の位置が変わる ── それ以外は同じ構造</text>

  <!-- Center divider -->
  <line x1="800" y1="140" x2="800" y2="820" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ============= Left column: cortex ============= -->
  <g font-family="Noto Sans JP, sans-serif">
    <text x="400" y="170" font-size="24" fill="#a78bfa" text-anchor="middle" font-weight="bold">cortex (社内AI基盤)</text>
    <text x="400" y="196" font-size="14" fill="#94a3b8" text-anchor="middle">人間レビュアー無しでauto-mergeまで成立</text>

    <!-- Stage 1: 社内ナレッジグラフ -->
    <rect x="100" y="220" width="600" height="88" rx="8" fill="#1a1525" stroke="#a78bfa" stroke-width="2"/>
    <text x="400" y="248" font-size="17" fill="#a78bfa" text-anchor="middle" font-weight="bold">社内ナレッジグラフ ── 1リポジトリで完結</text>
    <text x="400" y="274" font-size="13" fill="#cbd5e1" text-anchor="middle">コードとdocsとDBスキーマとインフラ定義を</text>
    <text x="400" y="292" font-size="13" fill="#cbd5e1" text-anchor="middle">1グラフに統合した知識基盤</text>

    <line x1="400" y1="314" x2="400" y2="340" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#a-a78bfa)"/>

    <!-- Stage 2: Auto Review (common) -->
    <rect x="100" y="344" width="600" height="88" rx="8" fill="#1a1525" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="400" y="372" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">PR open → AI Auto Review</text>
    <text x="400" y="398" font-size="13" fill="#94a3b8" text-anchor="middle">9 lensのreview-fix loop</text>
    <text x="400" y="416" font-size="13" fill="#64748b" text-anchor="middle">← この層は両方共通 →</text>

    <line x1="400" y1="438" x2="400" y2="464" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#a-a78bfa)"/>

    <!-- Stage 3: AI APPROVE → auto-merge -->
    <rect x="100" y="468" width="600" height="88" rx="8" fill="#1a1525" stroke="#a78bfa" stroke-width="2"/>
    <text x="400" y="496" font-size="17" fill="#a78bfa" text-anchor="middle" font-weight="bold">AI APPROVE → auto-merge</text>
    <text x="400" y="522" font-size="13" fill="#cbd5e1" text-anchor="middle">人間介入なし。CI green + APPROVE揃った瞬間に</text>
    <text x="400" y="540" font-size="13" fill="#cbd5e1" text-anchor="middle">自動マージスクリプトが拾って本番反映</text>

    <line x1="400" y1="562" x2="400" y2="588" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#a-a78bfa)"/>

    <!-- Stage 4: Production -->
    <rect x="100" y="592" width="600" height="74" rx="8" fill="#1a1525" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="400" y="620" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">本番反映</text>
    <text x="400" y="646" font-size="13" fill="#94a3b8" text-anchor="middle">障害は気づく前に治る前提でよい</text>

    <line x1="400" y1="666" x2="400" y2="692" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#a-a78bfa)"/>

    <!-- Stage 5: Self-Healing -->
    <rect x="100" y="696" width="600" height="88" rx="8" fill="#1a1525" stroke="#a78bfa" stroke-width="2"/>
    <text x="400" y="724" font-size="17" fill="#a78bfa" text-anchor="middle" font-weight="bold">Self-Healing</text>
    <text x="400" y="750" font-size="13" fill="#cbd5e1" text-anchor="middle">アラート → AIが原因調査 → 修正PR →</text>
    <text x="400" y="768" font-size="13" fill="#cbd5e1" text-anchor="middle">自動マージ → 自動再デプロイで完結 (Part 4)</text>
  </g>

  <!-- ============= Right column: toC ============= -->
  <g font-family="Noto Sans JP, sans-serif">
    <text x="1200" y="170" font-size="24" fill="#fb923c" text-anchor="middle" font-weight="bold">toC (本番サービス)</text>
    <text x="1200" y="196" font-size="14" fill="#94a3b8" text-anchor="middle">最後にもう一段「人間sign-off」を挟む</text>

    <!-- Stage 1: サービス側ナレッジグラフ ★差分★ -->
    <rect x="900" y="220" width="600" height="88" rx="8" fill="#251a0d" stroke="#fb923c" stroke-width="2.5"/>
    <text x="1490" y="240" font-size="11" fill="#fb923c" text-anchor="end" font-style="italic">★差分★</text>
    <text x="1200" y="248" font-size="17" fill="#fb923c" text-anchor="middle" font-weight="bold">サービス側ナレッジグラフ ── 40+リポジトリ横断</text>
    <text x="1200" y="274" font-size="13" fill="#cbd5e1" text-anchor="middle">フロント / バックエンド / バッチ / 管理画面 etc.</text>
    <text x="1200" y="292" font-size="13" fill="#cbd5e1" text-anchor="middle">複数リポジトリを横断するナレッジグラフ</text>

    <line x1="1200" y1="314" x2="1200" y2="340" stroke="#fb923c" stroke-width="1.8" marker-end="url(#a-fb923c)"/>

    <!-- Stage 2: Auto Review (common) -->
    <rect x="900" y="344" width="600" height="88" rx="8" fill="#251a0d" stroke="#fb923c" stroke-width="1.5"/>
    <text x="1200" y="372" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">PR open → AI Auto Review</text>
    <text x="1200" y="398" font-size="13" fill="#94a3b8" text-anchor="middle">9 lensのreview-fix loop</text>
    <text x="1200" y="416" font-size="13" fill="#64748b" text-anchor="middle">← この層は両方共通 →</text>

    <line x1="1200" y1="438" x2="1200" y2="464" stroke="#fb923c" stroke-width="1.8" marker-end="url(#a-fb923c)"/>

    <!-- Stage 3: AI下準備 + 人間 sign-off ★差分★ -->
    <rect x="900" y="468" width="600" height="88" rx="8" fill="#251a0d" stroke="#fb923c" stroke-width="2.5"/>
    <text x="1490" y="488" font-size="11" fill="#fb923c" text-anchor="end" font-style="italic">★差分★</text>
    <text x="1200" y="496" font-size="17" fill="#fb923c" text-anchor="middle" font-weight="bold">AI下準備 + 人間sign-off → merge</text>
    <text x="1200" y="522" font-size="13" fill="#cbd5e1" text-anchor="middle">AIがテスト作成 / 実行 / レビューまで整え、</text>
    <text x="1200" y="540" font-size="13" fill="#cbd5e1" text-anchor="middle">最終APPROVEは人間が押す</text>

    <line x1="1200" y1="562" x2="1200" y2="588" stroke="#fb923c" stroke-width="1.8" marker-end="url(#a-fb923c)"/>

    <!-- Stage 4: Production -->
    <rect x="900" y="592" width="600" height="74" rx="8" fill="#251a0d" stroke="#fb923c" stroke-width="1.5"/>
    <text x="1200" y="620" font-size="17" fill="#cbd5e1" text-anchor="middle" font-weight="bold">本番反映</text>
    <text x="1200" y="646" font-size="13" fill="#94a3b8" text-anchor="middle">事故が起きないことが前提 (ユーザー影響を許容できない)</text>

    <line x1="1200" y1="666" x2="1200" y2="692" stroke="#fb923c" stroke-width="1.8" marker-end="url(#a-fb923c)"/>

    <!-- Stage 5: 障害対応 ★差分★ -->
    <rect x="900" y="696" width="600" height="88" rx="8" fill="#251a0d" stroke="#fb923c" stroke-width="2.5"/>
    <text x="1490" y="716" font-size="11" fill="#fb923c" text-anchor="end" font-style="italic">★差分★</text>
    <text x="1200" y="724" font-size="17" fill="#fb923c" text-anchor="middle" font-weight="bold">障害対応は人間の判断を経る</text>
    <text x="1200" y="750" font-size="13" fill="#cbd5e1" text-anchor="middle">Self-Healingで auto-mergeまで自動化はしない。</text>
    <text x="1200" y="768" font-size="13" fill="#cbd5e1" text-anchor="middle">調査と修正案までAIが整え、最終判断は人間</text>
  </g>

  <!-- Footer -->
  <text x="800" y="850" font-size="14" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">社内 → サービス側ナレッジグラフ / auto-merge → AI下準備+人間sign-off / Self-Healing自動 → 人間最終判断 ── 3点が変わるだけで、それ以外はcortexの型を流用できる</text>
  <text x="800" y="875" font-size="14" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">エンジニア時間は実装/レビュー対応からsign-off専念に圧縮、書く側 (= 業務要件を把握している人) と合わせて処理可能量は増える</text>
</svg>
