<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrSky" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="4" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="4" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#fb923c"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="4" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrGrey" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="4" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrDown" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="9" markerHeight="8" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#0f172a"/>

  <text x="800" y="60" font-size="38" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, system-ui, sans-serif">タイプ1 と タイプ2 ── 決定論では手が届かなかった 2 種類の領域</text>
  <text x="800" y="100" font-size="22" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, system-ui, sans-serif">既存ワークフローのボトルネック解消 vs 未探索領域の開拓</text>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <!-- LEFT PANEL: Type 1 -->
    <rect x="60" y="160" width="720" height="660" rx="14" fill="#0c2540" stroke="#38bdf8" stroke-width="2"/>
    <text x="420" y="210" font-size="26" fill="#38bdf8" text-anchor="middle" font-weight="bold">タイプ1: ボトルネック解消</text>
    <text x="420" y="240" font-size="15" fill="#7dd3fc" text-anchor="middle">既存フローの真ん中が詰まっている → AI で拡幅する</text>

    <!-- BEFORE -->
    <text x="420" y="290" font-size="17" fill="#fca5a5" text-anchor="middle" font-weight="600">Before ── 人手判断で詰まる</text>

    <!-- Input: multiple sources -->
    <rect x="100" y="315" width="130" height="28" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="165" y="334" font-size="12" fill="#cbd5e1" text-anchor="middle">ダッシュボード</text>
    <rect x="100" y="349" width="130" height="28" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="165" y="368" font-size="12" fill="#cbd5e1" text-anchor="middle">ログ</text>
    <rect x="100" y="383" width="130" height="28" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="165" y="402" font-size="12" fill="#cbd5e1" text-anchor="middle">メトリクス</text>
    <rect x="100" y="417" width="130" height="28" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="165" y="436" font-size="12" fill="#cbd5e1" text-anchor="middle">アラート</text>

    <!-- Arrows into bottleneck -->
    <path d="M 230 329 L 340 375" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrGrey)"/>
    <path d="M 230 363 L 340 380" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrGrey)"/>
    <path d="M 230 397 L 340 385" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrGrey)"/>
    <path d="M 230 431 L 340 390" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrGrey)"/>

    <!-- Bottleneck (narrow, red) -->
    <ellipse cx="380" cy="380" rx="45" ry="18" fill="#450a0a" stroke="#dc2626" stroke-width="2"/>
    <text x="380" y="385" font-size="13" fill="#fca5a5" text-anchor="middle" font-weight="bold">人手判断</text>

    <!-- Thin output line -->
    <path d="M 425 380 L 560 380" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>

    <!-- Output (small) -->
    <rect x="570" y="365" width="140" height="30" rx="4" fill="#1e293b" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="640" y="384" font-size="12" fill="#94a3b8" text-anchor="middle">限定的な判断・対応</text>

    <text x="420" y="475" font-size="13" fill="#fca5a5" text-anchor="middle" font-style="italic">情報は流れてくるが、 人の認知が処理しきれない</text>

    <!-- Down arrow separator -->
    <path d="M 420 500 L 420 535" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrDown)"/>
    <text x="480" y="525" font-size="14" fill="#fdba74" text-anchor="start" font-style="italic">AI で拡幅</text>

    <!-- AFTER -->
    <text x="420" y="575" font-size="17" fill="#fdba74" text-anchor="middle" font-weight="600">After ── AI が判断を担う</text>

    <!-- Same inputs -->
    <rect x="100" y="600" width="130" height="28" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="165" y="619" font-size="12" fill="#e2e8f0" text-anchor="middle">ダッシュボード</text>
    <rect x="100" y="634" width="130" height="28" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="165" y="653" font-size="12" fill="#e2e8f0" text-anchor="middle">ログ</text>
    <rect x="100" y="668" width="130" height="28" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="165" y="687" font-size="12" fill="#e2e8f0" text-anchor="middle">メトリクス</text>
    <rect x="100" y="702" width="130" height="28" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="165" y="721" font-size="12" fill="#e2e8f0" text-anchor="middle">アラート</text>

    <!-- Arrows to AI -->
    <path d="M 230 614 L 335 655" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrSky)"/>
    <path d="M 230 648 L 335 660" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrSky)"/>
    <path d="M 230 682 L 335 665" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrSky)"/>
    <path d="M 230 716 L 335 670" fill="none" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arrSky)"/>

    <!-- AI node (wide, bright) -->
    <rect x="340" y="635" width="100" height="60" rx="8" fill="#0f172a" stroke="#fb923c" stroke-width="3"/>
    <text x="390" y="672" font-size="19" fill="#fed7aa" text-anchor="middle" font-weight="bold">AI 判断</text>

    <!-- Wide output arrow -->
    <path d="M 440 665 L 560 665" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrOrange)"/>

    <!-- Output (large) -->
    <rect x="570" y="650" width="140" height="30" rx="4" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
    <text x="640" y="669" font-size="13" fill="#fed7aa" text-anchor="middle">十全な判断・対応</text>

    <text x="420" y="770" font-size="13" fill="#fdba74" text-anchor="middle" font-style="italic">AI が大量情報を並列に解釈 → 詰まりが消える</text>

    <!-- RIGHT PANEL: Type 2 -->
    <rect x="820" y="160" width="720" height="660" rx="14" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2"/>
    <text x="1180" y="210" font-size="26" fill="#a78bfa" text-anchor="middle" font-weight="bold">タイプ2: 未探索領域の開拓</text>
    <text x="1180" y="240" font-size="15" fill="#c4b5fd" text-anchor="middle">バラバラだった点を AI + 決定論が意味的な網の目に織り上げる</text>

    <!-- BEFORE -->
    <text x="1180" y="290" font-size="17" fill="#94a3b8" text-anchor="middle" font-weight="600">Before ── 点は存在するが、 関係が見えない</text>

    <!-- Scattered points -->
    <circle cx="960" cy="360" r="30" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="960" y="365" font-size="12" fill="#cbd5e1" text-anchor="middle">コード</text>
    <circle cx="1130" cy="330" r="30" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="1130" y="335" font-size="12" fill="#cbd5e1" text-anchor="middle">テーブル</text>
    <circle cx="1310" cy="380" r="30" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="1310" y="385" font-size="12" fill="#cbd5e1" text-anchor="middle">施策</text>
    <circle cx="1420" cy="330" r="30" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="1420" y="335" font-size="12" fill="#cbd5e1" text-anchor="middle">KPI</text>
    <circle cx="1030" cy="450" r="30" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="1030" y="455" font-size="12" fill="#cbd5e1" text-anchor="middle">Docs</text>
    <circle cx="1240" cy="470" r="30" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="1240" y="475" font-size="12" fill="#cbd5e1" text-anchor="middle">ログ</text>
    <circle cx="1380" cy="450" r="30" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
    <text x="1380" y="455" font-size="11" fill="#cbd5e1" text-anchor="middle">スキーマ</text>

    <text x="1180" y="525" font-size="13" fill="#94a3b8" text-anchor="middle" font-style="italic">個別データは存在するが、 意味的な繋がりがない</text>

    <!-- Down arrow separator -->
    <path d="M 1180 530 L 1180 565" fill="none" stroke="#fb923c" stroke-width="3" marker-end="url(#arrDown)"/>
    <text x="1240" y="555" font-size="14" fill="#fdba74" text-anchor="start" font-style="italic">AI + 決定論で編む</text>

    <!-- AFTER -->
    <text x="1180" y="605" font-size="17" fill="#c4b5fd" text-anchor="middle" font-weight="600">After ── 意味的な網の目に織り上がる</text>

    <!-- Same nodes connected -->
    <!-- Edges first (drawn below nodes) -->
    <line x1="960" y1="670" x2="1130" y2="640" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="960" y1="670" x2="1030" y2="760" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="1130" y1="640" x2="1310" y2="690" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="1130" y1="640" x2="1240" y2="780" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="1310" y1="690" x2="1420" y2="640" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="1310" y1="690" x2="1380" y2="760" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="1240" y1="780" x2="1030" y2="760" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="1240" y1="780" x2="1380" y2="760" stroke="#a78bfa" stroke-width="1.8" opacity="0.85"/>
    <line x1="1030" y1="760" x2="1130" y2="640" stroke="#a78bfa" stroke-width="1.8" opacity="0.6"/>
    <line x1="1420" y1="640" x2="1240" y2="780" stroke="#a78bfa" stroke-width="1.8" opacity="0.6"/>

    <!-- Nodes (bright, connected) -->
    <circle cx="960" cy="670" r="30" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="960" y="675" font-size="12" fill="#e0e7ff" text-anchor="middle">コード</text>
    <circle cx="1130" cy="640" r="30" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1130" y="645" font-size="12" fill="#e0e7ff" text-anchor="middle">テーブル</text>
    <circle cx="1310" cy="690" r="30" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1310" y="695" font-size="12" fill="#e0e7ff" text-anchor="middle">施策</text>
    <circle cx="1420" cy="640" r="30" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1420" y="645" font-size="12" fill="#e0e7ff" text-anchor="middle">KPI</text>
    <circle cx="1030" cy="760" r="30" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1030" y="765" font-size="12" fill="#e0e7ff" text-anchor="middle">Docs</text>
    <circle cx="1240" cy="780" r="30" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1240" y="785" font-size="12" fill="#e0e7ff" text-anchor="middle">ログ</text>
    <circle cx="1380" cy="760" r="30" fill="#1e0f2b" stroke="#a78bfa" stroke-width="2.5"/>
    <text x="1380" y="765" font-size="11" fill="#e0e7ff" text-anchor="middle">スキーマ</text>
  </g>
</svg>
