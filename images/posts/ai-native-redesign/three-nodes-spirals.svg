<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrowNeg" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="4" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowPos" viewBox="0 0 6 6" refX="5" refY="3" markerWidth="5" markerHeight="4" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#0f172a"/>

  <text x="800" y="60" font-size="38" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, system-ui, sans-serif">3ノードループ ── 負のスパイラルと正のスパイラル</text>
  <text x="800" y="100" font-size="22" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, system-ui, sans-serif">AI 前提の再設計が「回らない仕組み」を「自己維持する仕組み」に変える</text>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <!-- LEFT PANEL: Negative Spiral -->
    <rect x="60" y="160" width="700" height="660" rx="14" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="410" y="215" font-size="30" fill="#94a3b8" text-anchor="middle" font-weight="bold">負のスパイラル</text>
    <text x="410" y="245" font-size="17" fill="#64748b" text-anchor="middle">人手前提のバランスで組み立てた仕組み</text>

    <!-- Nodes (dashed borders, muted fills) -->
    <circle cx="220" cy="410" r="70" fill="#0f172a" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="220" y="418" font-size="24" fill="#94a3b8" text-anchor="middle" font-weight="600">作成</text>

    <circle cx="600" cy="410" r="70" fill="#0f172a" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="600" y="418" font-size="24" fill="#94a3b8" text-anchor="middle" font-weight="600">維持</text>

    <circle cx="410" cy="620" r="70" fill="#0f172a" stroke="#475569" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="410" y="628" font-size="24" fill="#94a3b8" text-anchor="middle" font-weight="600">消費</text>

    <!-- Failure captions below nodes -->
    <text x="220" y="522" font-size="14" fill="#64748b" text-anchor="middle" font-style="italic">誰も読まないから</text>
    <text x="220" y="540" font-size="14" fill="#64748b" text-anchor="middle" font-style="italic">書かない</text>

    <text x="600" y="522" font-size="14" fill="#64748b" text-anchor="middle" font-style="italic">更新しても</text>
    <text x="600" y="540" font-size="14" fill="#64748b" text-anchor="middle" font-style="italic">気にされない</text>

    <text x="410" y="732" font-size="14" fill="#64748b" text-anchor="middle" font-style="italic">古いか不正確</text>

    <!-- Arrows (dashed, curved, muted) -->
    <path d="M 290 410 Q 410 380 530 410" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowNeg)"/>
    <path d="M 570 470 Q 530 570 460 580" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowNeg)"/>
    <path d="M 360 580 Q 280 570 250 470" fill="none" stroke="#475569" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrowNeg)"/>

    <!-- Bottom summary -->
    <text x="410" y="790" font-size="16" fill="#64748b" text-anchor="middle">3 者が「やらない理由」を相互に補強し、</text>
    <text x="410" y="810" font-size="16" fill="#64748b" text-anchor="middle">仕組みが沈黙のうちに空洞化する</text>

    <!-- RIGHT PANEL: Positive Spiral -->
    <rect x="840" y="160" width="700" height="660" rx="14" fill="#0c2540" stroke="#38bdf8" stroke-width="2"/>
    <text x="1190" y="215" font-size="30" fill="#38bdf8" text-anchor="middle" font-weight="bold">正のスパイラル</text>
    <text x="1190" y="245" font-size="17" fill="#7dd3fc" text-anchor="middle">AI 前提で 3 ノードを組み立て直す</text>

    <!-- Nodes (solid bright borders) -->
    <circle cx="1000" cy="410" r="70" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <text x="1000" y="418" font-size="24" fill="#e2e8f0" text-anchor="middle" font-weight="600">作成</text>
    <rect x="1010" y="336" width="100" height="26" rx="6" fill="#fb923c"/>
    <text x="1060" y="354" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="700">AI × 決定論</text>

    <circle cx="1380" cy="410" r="70" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <text x="1380" y="418" font-size="24" fill="#e2e8f0" text-anchor="middle" font-weight="600">維持</text>
    <rect x="1390" y="336" width="100" height="26" rx="6" fill="#fb923c"/>
    <text x="1440" y="354" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="700">AI × 決定論</text>

    <circle cx="1190" cy="620" r="70" fill="#0f172a" stroke="#38bdf8" stroke-width="3"/>
    <text x="1190" y="628" font-size="24" fill="#e2e8f0" text-anchor="middle" font-weight="600">消費</text>
    <rect x="1200" y="546" width="100" height="26" rx="6" fill="#fb923c"/>
    <text x="1250" y="564" font-size="13" fill="#0f172a" text-anchor="middle" font-weight="700">AI × 決定論</text>

    <!-- Feature captions below nodes -->
    <text x="1000" y="522" font-size="14" fill="#7dd3fc" text-anchor="middle">構造化して残す</text>

    <text x="1380" y="522" font-size="14" fill="#7dd3fc" text-anchor="middle">drift を検知して</text>
    <text x="1380" y="540" font-size="14" fill="#7dd3fc" text-anchor="middle">source と同期</text>

    <text x="1190" y="732" font-size="14" fill="#7dd3fc" text-anchor="middle">意味的に引く</text>

    <!-- Arrows (solid, thick, bright) -->
    <path d="M 1070 410 Q 1190 380 1310 410" fill="none" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowPos)"/>
    <path d="M 1350 470 Q 1310 570 1240 580" fill="none" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowPos)"/>
    <path d="M 1140 580 Q 1060 570 1030 470" fill="none" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowPos)"/>

    <!-- Bottom summary -->
    <text x="1190" y="782" font-size="16" fill="#7dd3fc" text-anchor="middle">3 ノードが自己維持し、 正のフィードバックで質が上がっていく</text>
    <text x="1190" y="808" font-size="13" fill="#94a3b8" text-anchor="middle" font-style="italic">※各ノードで AI が担う範囲は設計判断 (決定論優先)</text>
  </g>
</svg>
