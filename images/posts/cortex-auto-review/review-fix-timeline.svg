  <!-- Title -->
  <text x="800" y="56" font-size="30" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, sans-serif">review-fix loop の実例 — meet pipeline の embedding v2 移行PR / 1.5時間 で 6 iteration</text>
  <text x="800" y="92" font-size="18" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">feat(meet): dual-write embeddings to new 'embedding' column (v2) — 2026-05-19 07:25 起票 → 08:57 merge</text>

  <!-- Timeline base line -->
  <line x1="80" y1="500" x2="1520" y2="500" stroke="#475569" stroke-width="3"/>

