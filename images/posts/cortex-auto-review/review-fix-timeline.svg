    <text x="135" y="362" font-size="12" fill="#fbbf24" font-weight="bold">Minor x2:</text>
    <text x="140" y="382" font-size="11" fill="#cbd5e1">• [Test] v2 値が検証されていない</text>
    <text x="140" y="398" font-size="11" fill="#cbd5e1">• [Test] v2 null シナリオ未テスト</text>

    <text x="135" y="430" font-size="11" fill="#94a3b8">引用元: graph-integrity.md /</text>
    <text x="135" y="446" font-size="11" fill="#94a3b8">severity.md / testing.md</text>
    <text x="135" y="466" font-size="11" fill="#94a3b8">「既存違反は降格理由にならない」</text>
  </g>

  <line x1="240" y1="486" x2="240" y2="500" stroke="#f87171" stroke-width="2"/>

  <!-- Event 3: 2nd review -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="340" y="230" width="240" height="250" rx="10" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="460" y="258" font-size="14" fill="#f87171" text-anchor="middle" font-weight="bold">2nd review</text>
    <text x="460" y="280" font-size="12" fill="#cbd5e1" text-anchor="middle">REQUEST_CHANGES</text>

    <line x1="350" y1="296" x2="570" y2="296" stroke="#475569" stroke-width="1"/>

    <text x="460" y="318" font-size="12" fill="#4ade80" text-anchor="middle">前回 Critical 全部解消確認</text>

    <text x="355" y="346" font-size="12" fill="#fb923c" font-weight="bold">新規 Major:</text>
    <text x="360" y="364" font-size="11" fill="#cbd5e1">• [Test] 禁止 Matcher 使用</text>
    <text x="360" y="380" font-size="11" fill="#cbd5e1">  (objectContaining で値検証)</text>

    <text x="360" y="420" font-size="11" fill="#94a3b8">前回の partial 修正だけでなく</text>
    <text x="360" y="436" font-size="11" fill="#94a3b8">本質まで踏み込まないと止めない</text>
  </g>

  <line x1="460" y1="486" x2="460" y2="500" stroke="#f87171" stroke-width="2"/>

  <!-- Event 4: 3rd review -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="600" y="230" width="240" height="250" rx="10" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="720" y="258" font-size="14" fill="#f87171" text-anchor="middle" font-weight="bold">3rd review</text>
    <text x="720" y="280" font-size="12" fill="#cbd5e1" text-anchor="middle">REQUEST_CHANGES</text>

    <line x1="610" y1="296" x2="830" y2="296" stroke="#475569" stroke-width="1"/>

    <text x="720" y="318" font-size="12" fill="#4ade80" text-anchor="middle">[Test] Major 解消確認</text>

    <text x="615" y="346" font-size="12" fill="#fb923c" font-weight="bold">新規 Major:</text>
    <text x="620" y="364" font-size="11" fill="#cbd5e1">• [Observability] migration</text>
    <text x="620" y="380" font-size="11" fill="#cbd5e1">  script の logging 不足</text>

    <text x="620" y="420" font-size="11" fill="#94a3b8">同じ class の指摘が出ないように</text>
    <text x="620" y="436" font-size="11" fill="#94a3b8">深い観点へ進化していく</text>
  </g>

  <line x1="720" y1="486" x2="720" y2="500" stroke="#f87171" stroke-width="2"/>

  <!-- Event 5: 4th review -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="820" y="230" width="240" height="250" rx="10" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="940" y="258" font-size="14" fill="#f87171" text-anchor="middle" font-weight="bold">4th review</text>
    <text x="940" y="280" font-size="12" fill="#cbd5e1" text-anchor="middle">REQUEST_CHANGES</text>

    <line x1="830" y1="296" x2="1050" y2="296" stroke="#475569" stroke-width="1"/>

    <text x="940" y="318" font-size="12" fill="#4ade80" text-anchor="middle">[Observability] 解消確認</text>

    <text x="835" y="346" font-size="12" fill="#fb923c" font-weight="bold">細部の指摘:</text>
    <text x="840" y="364" font-size="11" fill="#cbd5e1">• [Test] mock.calls + toStrict</text>
    <text x="840" y="380" font-size="11" fill="#cbd5e1">  Equal への置換確認 OK</text>
    <text x="840" y="396" font-size="11" fill="#cbd5e1">• @graph-domain 末尾カンマ</text>
  </g>

  <line x1="940" y1="486" x2="940" y2="500" stroke="#f87171" stroke-width="2"/>

  <!-- Event 6: 5th review -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="1040" y="230" width="240" height="250" rx="10" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="1160" y="258" font-size="14" fill="#f87171" text-anchor="middle" font-weight="bold">5th review</text>
    <text x="1160" y="280" font-size="12" fill="#cbd5e1" text-anchor="middle">REQUEST_CHANGES</text>

    <line x1="1050" y1="296" x2="1270" y2="296" stroke="#475569" stroke-width="1"/>

    <text x="1160" y="318" font-size="12" fill="#cbd5e1" text-anchor="middle">前回指摘さらに細部修正</text>

    <text x="1055" y="346" font-size="12" fill="#fb923c" font-weight="bold">残課題:</text>
    <text x="1060" y="364" font-size="11" fill="#cbd5e1">• 一部 weak matcher 残存</text>
    <text x="1060" y="380" font-size="11" fill="#cbd5e1">• migration script ログ追加</text>

    <text x="1060" y="420" font-size="11" fill="#94a3b8">「合格」までを引き上げる</text>
  </g>

  <line x1="1160" y1="486" x2="1160" y2="500" stroke="#f87171" stroke-width="2"/>

  <!-- Event 7: 6th review APPROVE -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="1260" y="230" width="240" height="250" rx="10" fill="#0d2820" stroke="#4ade80" stroke-width="2"/>
    <text x="1380" y="258" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="bold">6th review</text>
    <text x="1380" y="280" font-size="12" fill="#cbd5e1" text-anchor="middle">APPROVE</text>

    <line x1="1270" y1="296" x2="1490" y2="296" stroke="#475569" stroke-width="1"/>

    <text x="1380" y="318" font-size="12" fill="#4ade80" text-anchor="middle">全 Critical / Major 解消</text>

    <text x="1380" y="356" font-size="12" fill="#cbd5e1" text-anchor="middle">同 SHA で多重確認</text>
    <text x="1380" y="376" font-size="11" fill="#94a3b8" text-anchor="middle">(別観点で再 review しても</text>
    <text x="1380" y="392" font-size="11" fill="#94a3b8" text-anchor="middle">指摘なしを確認)</text>

    <text x="1380" y="430" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="bold">auto-merge script 起動</text>
    <text x="1380" y="448" font-size="11" fill="#94a3b8" text-anchor="middle">→ squash merge</text>
  </g>

  <line x1="1380" y1="486" x2="1380" y2="500" stroke="#4ade80" stroke-width="2"/>

  <!-- Event 8: Merge -->
  <g font-family="Noto Sans JP, sans-serif">
    <text x="1520" y="572" font-size="14" fill="#4ade80" text-anchor="middle" font-weight="bold">merge</text>
    <text x="1520" y="592" font-size="12" fill="#94a3b8" text-anchor="middle">→ deploy</text>
  </g>

  <!-- Auto-Fix arrows (between reviews) -->
  <g>
    <path d="M 240 500 Q 350 660 460 500" stroke="#fb923c" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a-fb923c)"/>
    <path d="M 460 500 Q 590 660 720 500" stroke="#fb923c" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a-fb923c)"/>
    <path d="M 720 500 Q 830 660 940 500" stroke="#fb923c" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a-fb923c)"/>
    <path d="M 940 500 Q 1050 660 1160 500" stroke="#fb923c" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a-fb923c)"/>
    <path d="M 1160 500 Q 1270 660 1380 500" stroke="#fb923c" stroke-width="2" fill="none" stroke-dasharray="6 4" marker-end="url(#a-fb923c)"/>

    <text x="800" y="690" font-size="14" fill="#fb923c" text-anchor="middle" font-family="Noto Sans JP, sans-serif" font-weight="bold">自動修正(PR作者のPCで動くauthorモード) が修正 commit + push を繰り返す</text>
  </g>

  <!-- Bottom takeaway -->
  <text x="800" y="730" font-size="14" fill="#cbd5e1" text-anchor="middle" font-family="Noto Sans JP, sans-serif">指摘の深さが iteration ごとに上がる: [Graph]/[Doc] → [Test] → [Observability] → 細部 → 同 SHA 多重確認 → APPROVE</text>
  <text x="800" y="754" font-size="13" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, sans-serif">人レビュアーなら数日かかる修正サイクルが、6 iteration / 1.5時間 で完結する</text>
</svg>
