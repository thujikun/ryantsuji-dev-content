  <circle cx="720" cy="500" r="11" fill="#f87171" stroke="#f87171" stroke-width="2"/>
  <circle cx="940" cy="500" r="11" fill="#f87171" stroke="#f87171" stroke-width="2"/>
  <circle cx="1160" cy="500" r="11" fill="#f87171" stroke="#f87171" stroke-width="2"/>
  <circle cx="1380" cy="500" r="11" fill="#4ade80" stroke="#4ade80" stroke-width="2"/>
  <circle cx="1520" cy="500" r="9" fill="#4ade80"/>

  <!-- Event 1: PR opened -->
  <g font-family="Noto Sans JP, sans-serif">
    <text x="80" y="572" font-size="14" fill="#cbd5e1" text-anchor="middle" font-weight="bold">PR opened</text>
    <text x="80" y="592" font-size="12" fill="#94a3b8" text-anchor="middle">起票</text>
  </g>

  <!-- Event 2: First review -->
  <g font-family="Noto Sans JP, sans-serif">
    <rect x="120" y="190" width="240" height="290" rx="10" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="240" y="218" font-size="14" fill="#f87171" text-anchor="middle" font-weight="bold">1st review</text>
    <text x="240" y="240" font-size="12" fill="#cbd5e1" text-anchor="middle">REQUEST_CHANGES</text>

    <line x1="130" y1="256" x2="350" y2="256" stroke="#475569" stroke-width="1"/>

    <text x="135" y="280" font-size="12" fill="#f87171" font-weight="bold">Critical x3:</text>
