  <!-- Title -->
  <text x="800" y="56" font-size="30" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="sans-serif">review-fix loop example — PR migrating embedding model from gemini-embedding-001 to gemini-embedding-2</text>
