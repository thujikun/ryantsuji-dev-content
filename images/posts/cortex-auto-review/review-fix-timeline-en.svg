  <!-- Bottom takeaway -->
  <text x="800" y="730" font-size="14" fill="#cbd5e1" text-anchor="middle" font-family="sans-serif">Finding depth escalates each iteration: [Graph]/[Doc] -&gt; [Test] -&gt; [Observability] -&gt; finer details -&gt; multi-SHA verification -&gt; APPROVE</text>
  <text x="800" y="754" font-size="13" fill="#94a3b8" text-anchor="middle" font-family="sans-serif">A multi-day human review cycle, closed in 6 iterations / 1.5 hours</text>
