<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940">
  <rect width="1600" height="940" fill="#0f172a"/>

  <defs>
    <marker id="a-94a3b8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/></marker>
    <marker id="a-f87171" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#f87171"/></marker>
    <marker id="a-4ade80" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
    <marker id="a-fb923c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/></marker>
  </defs>

  <!-- Title -->
  <text x="800" y="56" font-size="30" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="sans-serif">Before / After — Human-review era vs. cortex auto-review era</text>
  <text x="800" y="92" font-size="18" fill="#94a3b8" text-anchor="middle" font-family="sans-serif">Same PR ("Critical x3 + Minor x2 on first review"): how much time and human effort to merge</text>

  <!-- Divider line -->
  <line x1="800" y1="130" x2="800" y2="900" stroke="#334155" stroke-width="2" stroke-dasharray="10 6"/>

  <!-- ============ LEFT: Before (Human-only review) ============ -->
  <g font-family="sans-serif">
    <rect x="50" y="140" width="720" height="60" rx="14" fill="#2d1414" stroke="#f87171" stroke-width="2.5"/>
    <text x="410" y="178" font-size="22" fill="#f87171" text-anchor="middle" font-weight="bold">Human-review era</text>
  </g>

  <!-- Step 1: PR open -->
  <g font-family="sans-serif">
    <rect x="50" y="220" width="720" height="80" rx="12" fill="#1a2818" stroke="#4ade80" stroke-width="2"/>
    <text x="100" y="248" font-size="13" fill="#94a3b8">Day 1 — 14:00</text>
    <text x="100" y="276" font-size="16" fill="#4ade80" font-weight="bold">PR opened (human or AI)</text>
    <text x="100" y="292" font-size="13" fill="#cbd5e1">Assign reviewer, notify on Slack</text>
  </g>

  <!-- Arrow -->
  <line x1="410" y1="300" x2="410" y2="320" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  <text x="430" y="316" font-size="12" fill="#94a3b8" font-family="sans-serif">Wait for reviewer availability (hours to half a day)</text>

  <!-- Step 2: 1st human review -->
  <g font-family="sans-serif">
    <rect x="50" y="330" width="720" height="100" rx="12" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="100" y="358" font-size="13" fill="#94a3b8">Day 2 — 10:30</text>
    <text x="100" y="384" font-size="16" fill="#f87171" font-weight="bold">1st human review -&gt; REQUEST_CHANGES</text>
    <text x="100" y="402" font-size="13" fill="#cbd5e1">Catches 1-2 Criticals, misses others (doc drift, test coverage, etc.)</text>
    <text x="100" y="418" font-size="13" fill="#94a3b8">Depends on reviewer's focus and experience. Deep findings drop off in later iterations.</text>
  </g>

  <!-- Arrow -->
  <line x1="410" y1="430" x2="410" y2="450" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  <text x="430" y="446" font-size="12" fill="#94a3b8" font-family="sans-serif">Wait for author to address</text>

  <!-- Step 3: author fix -->
  <g font-family="sans-serif">
    <rect x="50" y="460" width="720" height="80" rx="12" fill="#251a0d" stroke="#fb923c" stroke-width="2"/>
    <text x="100" y="488" font-size="13" fill="#94a3b8">Day 2 — 17:00</text>
    <text x="100" y="514" font-size="16" fill="#fb923c" font-weight="bold">Author pushes fix</text>
    <text x="100" y="530" font-size="13" fill="#cbd5e1">Request re-review. Reviewer scheduling again.</text>
  </g>

  <!-- Arrow -->
  <line x1="410" y1="540" x2="410" y2="560" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  <text x="430" y="556" font-size="12" fill="#94a3b8" font-family="sans-serif">Wait for reviewer again</text>

  <!-- Step 4: 2nd review -->
  <g font-family="sans-serif">
    <rect x="50" y="570" width="720" height="80" rx="12" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="100" y="598" font-size="13" fill="#94a3b8">Day 3 — 11:00</text>
    <text x="100" y="624" font-size="16" fill="#f87171" font-weight="bold">2nd human review -&gt; more findings or APPROVE</text>
    <text x="100" y="640" font-size="13" fill="#94a3b8">Previously-missed Test / Observability findings often surface here</text>
  </g>

  <!-- Arrow -->
  <line x1="410" y1="650" x2="410" y2="670" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>

  <!-- Step 5: Merge -->
  <g font-family="sans-serif">
    <rect x="50" y="680" width="720" height="80" rx="12" fill="#0d2820" stroke="#4ade80" stroke-width="2"/>
    <text x="100" y="708" font-size="13" fill="#94a3b8">Day 3 — 16:00 (best case)</text>
    <text x="100" y="734" font-size="16" fill="#4ade80" font-weight="bold">merge -&gt; manual deploy</text>
    <text x="100" y="750" font-size="13" fill="#cbd5e1">Needs a separate deploy owner</text>
  </g>

  <!-- Bottom box: total -->
  <g font-family="sans-serif">
    <rect x="50" y="790" width="720" height="120" rx="14" fill="#1a1305" stroke="#f87171" stroke-width="2"/>
    <text x="410" y="822" font-size="18" fill="#f87171" text-anchor="middle" font-weight="bold">Total: 2-3 days per PR</text>
    <text x="410" y="850" font-size="14" fill="#cbd5e1" text-anchor="middle">Reviewer attention and schedule are the perpetual bottleneck</text>
    <text x="410" y="872" font-size="14" fill="#cbd5e1" text-anchor="middle">Deep findings (Doc / Test / Observability) easily drop through</text>
    <text x="410" y="894" font-size="14" fill="#cbd5e1" text-anchor="middle">As PR volume grows, the whole org stalls behind review</text>
  </g>

  <!-- ============ RIGHT: After (auto review) ============ -->
  <g font-family="sans-serif">
    <rect x="830" y="140" width="720" height="60" rx="14" fill="#0d2820" stroke="#4ade80" stroke-width="2.5"/>
    <text x="1190" y="178" font-size="22" fill="#4ade80" text-anchor="middle" font-weight="bold">cortex auto-review era</text>
  </g>

  <!-- R-Step 1: PR open -->
  <g font-family="sans-serif">
    <rect x="830" y="220" width="720" height="80" rx="12" fill="#1a2818" stroke="#4ade80" stroke-width="2"/>
    <text x="880" y="248" font-size="13" fill="#94a3b8">07:25</text>
    <text x="880" y="276" font-size="16" fill="#4ade80" font-weight="bold">PR opened (human or AI)</text>
    <text x="880" y="292" font-size="13" fill="#cbd5e1">webhook -&gt; reviewer mode starts on reviewer's PC</text>
  </g>

  <line x1="1190" y1="300" x2="1190" y2="320" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  <text x="1210" y="316" font-size="12" fill="#94a3b8" font-family="sans-serif">10 min</text>

  <!-- R-Step 2: 1st AI review -->
  <g font-family="sans-serif">
    <rect x="830" y="330" width="720" height="100" rx="12" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="880" y="358" font-size="13" fill="#94a3b8">07:35</text>
    <text x="880" y="384" font-size="16" fill="#f87171" font-weight="bold">1st AI review -&gt; REQUEST_CHANGES</text>
    <text x="880" y="402" font-size="13" fill="#cbd5e1">Catches Critical x3 + Minor x2 in one pass</text>
    <text x="880" y="418" font-size="13" fill="#94a3b8">9 dimensions checked in one session, each finding cites a guideline</text>
  </g>

  <line x1="1190" y1="430" x2="1190" y2="450" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  <text x="1210" y="446" font-size="12" fill="#94a3b8" font-family="sans-serif">Auto-fix kicks in -&gt; fix in minutes</text>

  <!-- R-Step 3: auto fix -->
  <g font-family="sans-serif">
    <rect x="830" y="460" width="720" height="80" rx="12" fill="#251a0d" stroke="#fb923c" stroke-width="2"/>
    <text x="880" y="488" font-size="13" fill="#94a3b8">07:40-07:50</text>
    <text x="880" y="514" font-size="16" fill="#fb923c" font-weight="bold">Author-mode script pushes the fix</text>
    <text x="880" y="530" font-size="13" fill="#cbd5e1">Runs on PR author's PC. Fixes inside a worktree, pushes immediately.</text>
  </g>

  <line x1="1190" y1="540" x2="1190" y2="560" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>
  <text x="1210" y="556" font-size="12" fill="#94a3b8" font-family="sans-serif">webhook refires</text>

  <!-- R-Step 4: re-review loop -->
  <g font-family="sans-serif">
    <rect x="830" y="570" width="720" height="80" rx="12" fill="#2d1414" stroke="#f87171" stroke-width="2"/>
    <text x="880" y="598" font-size="13" fill="#94a3b8">07:54 - 08:42</text>
    <text x="880" y="624" font-size="16" fill="#f87171" font-weight="bold">2nd-5th re-review (iterate x5)</text>
    <text x="880" y="640" font-size="13" fill="#94a3b8">Verify prior findings fully resolved, escalate to deeper dimensions (Test -&gt; Observability -&gt; ...)</text>
  </g>

  <line x1="1190" y1="650" x2="1190" y2="670" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-94a3b8)"/>

  <!-- R-Step 5: APPROVE -->
  <g font-family="sans-serif">
    <rect x="830" y="680" width="720" height="80" rx="12" fill="#0d2820" stroke="#4ade80" stroke-width="2"/>
    <text x="880" y="708" font-size="13" fill="#94a3b8">08:50 -&gt; 08:57</text>
    <text x="880" y="734" font-size="16" fill="#4ade80" font-weight="bold">APPROVE -&gt; auto-merge -&gt; auto deploy</text>
    <text x="880" y="750" font-size="13" fill="#cbd5e1">Turborepo + Pulumi parallel deploy, cpg index rebuilt in step</text>
  </g>

  <!-- R-Bottom -->
  <g font-family="sans-serif">
    <rect x="830" y="790" width="720" height="120" rx="14" fill="#0a1612" stroke="#4ade80" stroke-width="2"/>
    <text x="1190" y="822" font-size="18" fill="#4ade80" text-anchor="middle" font-weight="bold">Total: 1.5 hours per PR</text>
    <text x="1190" y="850" font-size="14" fill="#cbd5e1" text-anchor="middle">No review pileup. No dependence on human schedule.</text>
    <text x="1190" y="872" font-size="14" fill="#cbd5e1" text-anchor="middle">Deep findings caught by 9-dimension sequential check in one session</text>
    <text x="1190" y="894" font-size="14" fill="#cbd5e1" text-anchor="middle">Scales linearly with PR volume (769 PRs in past 30 days)</text>
  </g>
</svg>
