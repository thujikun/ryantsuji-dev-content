<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#0f172a"/>

  <defs>
    <marker id="a-sky" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/></marker>
    <marker id="a-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/></marker>
    <marker id="a-violet" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/></marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/></marker>
  </defs>

  <text x="800" y="60" font-size="34" fill="#e2e8f0" text-anchor="middle" font-weight="bold" font-family="Noto Sans JP, system-ui, sans-serif">フィールドアクセス解決の3段階の役割分担</text>
  <text x="800" y="98" font-size="18" fill="#94a3b8" text-anchor="middle" font-family="Noto Sans JP, system-ui, sans-serif">tree-sitter で取れない部分を、TypeScript Compiler と Gemini で補う</text>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="600" y="140" width="400" height="80" rx="10" fill="#1e293b" stroke="#94a3b8" stroke-width="2"/>
    <text x="800" y="172" font-size="18" fill="#e2e8f0" text-anchor="middle" font-weight="bold">入力: ソースコード</text>
    <text x="800" y="200" font-size="14" fill="#94a3b8" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">user.preferences.theme</text>
  </g>

  <line x1="800" y1="220" x2="800" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-muted)"/>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="80" y="280" width="440" height="220" rx="12" fill="#0c2540" stroke="#38bdf8" stroke-width="2"/>
    <text x="300" y="320" font-size="22" fill="#38bdf8" text-anchor="middle" font-weight="bold">第1段階: tree-sitter</text>
    <text x="300" y="354" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">構造抽出 (得意)</text>

    <text x="120" y="390" font-size="14" fill="#38bdf8" font-weight="bold">▸</text>
    <text x="145" y="390" font-size="14" fill="#cbd5e1">関数 / メソッド / クラス</text>

    <text x="120" y="418" font-size="14" fill="#38bdf8" font-weight="bold">▸</text>
    <text x="145" y="418" font-size="14" fill="#cbd5e1">フィールド / import</text>

    <text x="120" y="446" font-size="14" fill="#38bdf8" font-weight="bold">▸</text>
    <text x="145" y="446" font-size="14" fill="#cbd5e1">関数呼び出しの構造</text>

    <text x="120" y="478" font-size="13" fill="#94a3b8">→ 型情報 / スコープは弱い</text>
  </g>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="580" y="280" width="440" height="220" rx="12" fill="#1a1009" stroke="#fb923c" stroke-width="2"/>
    <text x="800" y="320" font-size="22" fill="#fb923c" text-anchor="middle" font-weight="bold">第2段階: TypeScript Compiler</text>
    <text x="800" y="354" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">変数 / 型解決</text>

    <text x="620" y="390" font-size="14" fill="#fb923c" font-weight="bold">▸</text>
    <text x="645" y="390" font-size="14" fill="#cbd5e1">変数 user の型を解決</text>

    <text x="620" y="418" font-size="14" fill="#fb923c" font-weight="bold">▸</text>
    <text x="645" y="418" font-size="14" fill="#cbd5e1">user.preferences の型解決</text>

    <text x="620" y="446" font-size="14" fill="#fb923c" font-weight="bold">▸</text>
    <text x="645" y="446" font-size="14" fill="#cbd5e1">スコープを跨いだ識別子解決</text>

    <text x="620" y="478" font-size="13" fill="#94a3b8">→ 動的に決まる部分は届かない</text>
  </g>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="1080" y="280" width="440" height="220" rx="12" fill="#1a0f1a" stroke="#a78bfa" stroke-width="2"/>
    <text x="1300" y="320" font-size="22" fill="#a78bfa" text-anchor="middle" font-weight="bold">第3段階: Gemini</text>
    <text x="1300" y="354" font-size="15" fill="#e2e8f0" text-anchor="middle" font-weight="bold">動的ケースの推定</text>

    <text x="1120" y="390" font-size="14" fill="#a78bfa" font-weight="bold">▸</text>
    <text x="1145" y="390" font-size="14" fill="#cbd5e1">動的に決まる変数名</text>

    <text x="1120" y="418" font-size="14" fill="#a78bfa" font-weight="bold">▸</text>
    <text x="1145" y="418" font-size="14" fill="#cbd5e1">複雑な型の推論</text>

    <text x="1120" y="446" font-size="14" fill="#a78bfa" font-weight="bold">▸</text>
    <text x="1145" y="446" font-size="14" fill="#cbd5e1">コンテキストからの推定</text>

    <text x="1120" y="478" font-size="13" fill="#94a3b8">→ 最後の砦</text>
  </g>

  <line x1="520" y1="390" x2="580" y2="390" stroke="#38bdf8" stroke-width="2" marker-end="url(#a-sky)"/>
  <line x1="1020" y1="390" x2="1080" y2="390" stroke="#fb923c" stroke-width="2" marker-end="url(#a-orange)"/>

  <line x1="300" y1="500" x2="660" y2="600" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-muted)" stroke-dasharray="4,4"/>
  <line x1="800" y1="500" x2="800" y2="600" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-muted)" stroke-dasharray="4,4"/>
  <line x1="1300" y1="500" x2="940" y2="600" stroke="#94a3b8" stroke-width="2" marker-end="url(#a-muted)" stroke-dasharray="4,4"/>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="500" y="620" width="600" height="100" rx="12" fill="#1e293b" stroke="#4ade80" stroke-width="3"/>
    <text x="800" y="660" font-size="22" fill="#4ade80" text-anchor="middle" font-weight="bold">統合: ナレッジグラフのノード</text>
    <text x="800" y="690" font-size="15" fill="#cbd5e1" text-anchor="middle">user.preferences.theme</text>
    <text x="800" y="710" font-size="13" fill="#94a3b8" text-anchor="middle">= UserPreferences.theme: string</text>
  </g>

  <g font-family="Noto Sans JP, system-ui, sans-serif">
    <rect x="200" y="760" width="1200" height="100" rx="10" fill="#0f172a" stroke="#475569" stroke-width="1"/>
    <text x="240" y="795" font-size="14" fill="#94a3b8" font-weight="bold">役割分担の狙い:</text>
    <text x="240" y="822" font-size="14" fill="#cbd5e1">構造抽出は速い tree-sitter で大量処理 → 型情報が必要な箇所だけ TypeScript Compiler → どうしても解決できない動的ケースだけ Gemini</text>
    <text x="240" y="846" font-size="13" fill="#94a3b8">それぞれの得意領域を組み合わせて、精度99%超のフィールド解決を実現</text>
  </g>
</svg>
