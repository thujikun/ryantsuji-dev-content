# 予約投稿 (scheduled publish) の cron driver — content repo 内で完結する版。
#
# 仕組み:
# - `posts/` 内の `draft: true` で `publishedAt` が現在時刻以下になった post の
#   frontmatter から `draft:` 行を削除
# - 変更があれば main に直 push (本 repo は branch protection 無し、push 即時反映)
# - 続けて parent monorepo (thujikun/self-management) に repository_dispatch を
#   投げ、`bump-submodule` workflow が submodule pointer 更新 PR を開く
#
# secrets:
# - `APP_ID` / `APP_PRIVATE_KEY`: GitHub App (両 repo に install 済み) の credentials。
#   default GITHUB_TOKEN は本 repo scope only で cross-repo dispatch 不可なため
#   installation token を使う。user PAT と独立した 5000/hr quota を持つ。
#   詳細セットアップ: ../../../self-management/docs/operations/github-app-setup.md
#
# 頻度: 15 分間隔 (`publishedAt` を datetime + TZ offset で指定すれば最大 15 分
# 遅延で flip される)。
name: Schedule publish

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: schedule-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  schedule-publish:
    name: Flip draft → published if publishedAt reached
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity (bot)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run schedule-publish
        id: run
        run: |
          out=$(node scripts/schedule-publish.mjs)
          echo "$out"
          # `PUBLISHED <filename>` 行から slug を抽出 (commit subject 用)
          slugs=$(echo "$out" | grep -E "^PUBLISHED " | sed -E 's/^PUBLISHED ([^.]+)\.(en|ja)\.md$/\1/' | sort -u | tr '\n' ',' | sed 's/,$//' | sed 's/,/, /g' || true)
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"

      - name: Commit & push if any post flipped
        if: steps.run.outputs.slugs != ''
        run: |
          git add posts/
          git commit \
            -m "chore(content): publish scheduled posts" \
            -m "slugs: ${{ steps.run.outputs.slugs }}"
          # 競合に強くするため pull --rebase --autostash を挟む
          git pull --rebase --autostash origin main
          git push origin HEAD:main

      - name: Generate App installation token (cross-repo)
        if: steps.run.outputs.slugs != ''
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: thujikun
          repositories: self-management

      - name: Dispatch parent monorepo (bump-submodule)
        if: steps.run.outputs.slugs != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/thujikun/self-management/dispatches \
            -f event_type=content-updated \
            -f client_payload[reason]="scheduled-publish" \
            -f client_payload[slugs]="${{ steps.run.outputs.slugs }}"
